<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>帝国对决 EMPIRE CLASH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f1a;--panel:#131828;--border:#1e2d4a;--accent:#4a8aff;
  --gold:#ffd866;--red:#ff4a6a;--green:#44dd88;--purple:#aa66ff;--orange:#ff9944;
  --text:#d8e4f0;--muted:#5a7a9a;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;overflow:hidden;height:100vh;font-size:13px;user-select:none}
#app{display:grid;grid-template-columns:220px 1fr 260px;grid-template-rows:50px 1fr 160px;height:100vh;gap:2px;background:#090b14}
button{cursor:pointer;font-family:inherit}

/* 顶栏 */
#topbar{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:14px;overflow:hidden}
#topbar .nation-name{color:var(--gold);font-size:15px;letter-spacing:3px;font-weight:bold;white-space:nowrap}
#topbar .year{color:var(--muted);font-size:11px;letter-spacing:2px;white-space:nowrap}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;font-size:11px;white-space:nowrap}
.stat-pill .val{font-weight:bold;color:#fff}
.stat-pill.gold .val{color:var(--gold)}
.stat-pill.pop .val{color:var(--green)}
.stat-pill.mil .val{color:var(--red)}
.stat-pill.stab .val{color:var(--purple)}
.stat-pill.tech .val{color:#44ccff}
#topbar .role-badge{padding:4px 12px;border-radius:3px;font-size:11px;letter-spacing:2px;border:1px solid;cursor:pointer;white-space:nowrap;margin-left:auto}
.role-badge:hover{opacity:.8}
#speed-ctrl{display:flex;align-items:center;gap:3px;margin-left:auto}
#speed-ctrl::before{content:'速度:';color:var(--muted);font-size:10px;margin-right:3px}
.spbtn{padding:3px 7px;font-size:10px;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:inherit;transition:all .1s}
.spbtn.active{background:rgba(74,138,255,.2);border-color:var(--accent);color:var(--accent)}
.spbtn:hover{background:rgba(255,255,255,.1)}

/* 左侧：部门面板 */
#sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:8px}
.dept-card{margin-bottom:6px;border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.dept-card.active{border-color:var(--accent);box-shadow:0 0 12px rgba(74,138,255,.3)}
.dept-card.player-here{border-color:var(--gold);box-shadow:0 0 12px rgba(255,216,102,.3)}
.dept-header{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;background:rgba(255,255,255,.03)}
.dept-header:hover{background:rgba(255,255,255,.07)}
.dept-icon{font-size:15px;width:22px;text-align:center}
.dept-name{flex:1;letter-spacing:1px;font-size:11px}
.dept-badge{font-size:9px;padding:1px 5px;border-radius:8px;letter-spacing:1px}
.badge-player{background:rgba(255,216,102,.2);color:var(--gold);border:1px solid var(--gold)}
.badge-ai{background:rgba(74,138,255,.15);color:var(--accent);border:1px solid rgba(74,138,255,.3)}
.dept-body{padding:7px 9px;border-top:1px solid var(--border);background:rgba(0,0,0,.2);display:none}
.dept-card.expanded .dept-body{display:block}
.dept-stat{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px;color:var(--muted)}
.dept-stat span{color:var(--text)}
.mini-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:2px 0 5px}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.take-btn{width:100%;margin-top:5px;padding:4px;font-size:10px;cursor:pointer;background:rgba(255,216,102,.12);color:var(--gold);border:1px solid rgba(255,216,102,.4);border-radius:3px;font-family:inherit;letter-spacing:1px;transition:all .15s}
.take-btn:hover{background:rgba(255,216,102,.25)}
.leave-btn{width:100%;margin-top:5px;padding:4px;font-size:10px;cursor:pointer;background:rgba(255,80,100,.1);color:var(--red);border:1px solid rgba(255,80,100,.3);border-radius:3px;font-family:inherit;letter-spacing:1px;transition:all .15s}
.leave-btn:hover{background:rgba(255,80,100,.2)}

/* 中间：主操作区 */
#main{background:var(--panel);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
#dept-title{font-size:16px;letter-spacing:3px;display:flex;align-items:center;gap:8px}
#dept-subtitle{color:var(--muted);font-size:10px;letter-spacing:1px}
#action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.action-btn{padding:8px 6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit;color:var(--text);font-size:10px;line-height:1.4;letter-spacing:1px}
.action-btn:hover{background:rgba(74,138,255,.15);border-color:var(--accent)}
.action-btn.cooling{opacity:.4;cursor:not-allowed;border-color:#333}
.action-btn .a-icon{font-size:16px;display:block;margin-bottom:2px}
.action-btn .a-name{display:block;margin-bottom:2px}
.action-btn .a-cost{color:var(--gold);font-size:9px}
.action-btn .a-cd{color:var(--muted);font-size:9px}
.action-btn .a-cd-bar{height:2px;background:rgba(255,80,100,.4);border-radius:1px;margin-top:3px;overflow:hidden}
.action-btn .a-cd-fill{height:100%;background:var(--red);transition:width .3s linear}

#province-section{border-top:1px solid var(--border);padding-top:8px}
#province-section h3{color:var(--muted);font-size:9px;letter-spacing:2px;margin-bottom:5px}
#province-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pbtn{padding:6px 4px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:10px;color:var(--text);font-family:inherit;letter-spacing:1px;transition:all .15s}
.pbtn:hover:not(:disabled){background:rgba(255,216,102,.12);border-color:var(--gold)}
.pbtn:disabled{opacity:.35;cursor:not-allowed}
.pbtn .pcost{display:block;color:var(--gold);font-size:8px;margin-top:1px}

#arena-wrap{position:relative;height:400px;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:#0f1729}
#cv{display:block;width:100%;height:100%;outline:none}
#unit-toolbar{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;display:flex;gap:5px;z-index:9;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);padding:4px;border-radius:6px;border:0.5px solid rgba(255,255,255,.15)}
.u-btn{width:42px;height:42px;background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--text);position:relative}
.u-btn:hover{background:rgba(255,216,102,.15)}
.u-btn.sel{background:var(--gold);color:#0c1220;border-color:var(--gold)}
.u-btn .uic{font-size:16px}
.u-btn .uoc{font-size:8px;color:var(--gold);margin-top:1px}
.u-btn.sel .uoc{color:#0c1220}

/* 右侧：数据面板 + 奏折 */
#rightpanel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:8px}
#rightpanel h3{color:var(--muted);font-size:10px;letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px}
.r-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;color:var(--muted)}
.r-row span{color:var(--text)}
.r-row span.up{color:var(--green)}
.r-row span.dn{color:var(--red)}
.progress-wrap{margin-bottom:6px}
.progress-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;color:var(--muted)}
.progress-label span{color:var(--text)}
.progress-bar{height:5px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s}

#province-list{margin-bottom:8px}
.prov-mini{display:flex;align-items:center;gap:6px;padding:4px 6px;margin-bottom:3px;border:1px solid var(--border);border-radius:3px;font-size:10px;background:rgba(0,0,0,.15)}
.prov-mini.stable{border-color:rgba(74,138,255,.4)}
.prov-mini.rich{border-color:rgba(68,221,136,.4)}
.prov-mini.war{border-color:rgba(255,153,68,.4)}
.prov-mini.lost{border-color:rgba(255,74,106,.4);opacity:.6}
.prov-mini .pnm{flex:1;color:var(--text)}
.prov-mini .pst{font-size:9px;color:var(--muted)}
.prov-mini .ptr{font-size:9px;color:var(--gold)}

#memo-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:10px;color:var(--muted)}
#memo-header .badge{color:var(--gold);font-size:10px}
.memo{padding:7px 8px;border-bottom:0.5px solid rgba(255,255,255,.08);background:rgba(0,0,0,.15);border-radius:3px;margin-bottom:4px}
.memo .mt{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.memo .mt .who{font-weight:500;color:var(--gold)}
.memo .mt .when{color:var(--muted)}
.memo .mb{font-size:10px;margin-bottom:5px;line-height:1.4;color:var(--text)}
.memo .ma{display:flex;gap:4px}
.memo .ma button{padding:3px 7px;font-size:9px;background:rgba(255,255,255,.05);color:var(--text);border:0.5px solid rgba(255,255,255,.15);border-radius:3px;font-family:inherit;cursor:pointer;transition:all .15s}
.memo .ma button:hover{background:rgba(255,216,102,.15);border-color:var(--gold)}
.memo .ma button.ok{color:var(--green);border-color:rgba(68,221,136,.4)}
.memo .ma button.no{color:var(--red);border-color:rgba(255,74,106,.4)}
.memo .cd-bar{height:2px;background:rgba(255,215,0,.2);border-radius:1px;margin-top:4px;overflow:hidden}
.memo .cd-fill{height:100%;background:var(--gold);transition:width .5s linear}

/* 底部：事件日志 */
#eventlog{grid-column:1/-1;background:var(--panel);border-top:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
#eventlog-header{padding:5px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px}
#eventlog-body{flex:1;overflow-y:auto;padding:5px 14px;display:flex;flex-direction:column-reverse;gap:2px}
.log-entry{font-size:10px;line-height:1.4;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-entry .log-time{color:var(--muted);margin-right:6px}
.log-entry .log-dept{font-weight:bold;margin-right:4px}
.log-dept.emperor{color:var(--gold)}
.log-dept.economy{color:var(--green)}
.log-dept.military{color:var(--red)}
.log-dept.politic{color:var(--purple)}
.log-dept.civic{color:var(--orange)}
.log-dept.tech{color:#44ccff}
.log-dept.spy{color:#aa88ff}
.log-dept.judge{color:#ffaa44}
.log-msg{color:var(--text)}
.log-entry.bad .log-msg{color:var(--red)}
.log-entry.good .log-msg{color:var(--green)}
.log-entry.event .log-msg{color:var(--gold)}

/* 模态 */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
#modal-overlay.on{display:flex}
#modal-box{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:24px;width:420px;text-align:center;max-height:90vh;overflow-y:auto}
#modal-box h2{color:var(--gold);font-size:16px;letter-spacing:3px;margin-bottom:10px}
#modal-box p{color:var(--muted);font-size:11px;line-height:1.7;margin-bottom:16px;text-align:left}
#modal-box .modal-btns{display:flex;gap:10px;justify-content:center}
#modal-box .modal-btns button{padding:6px 20px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:3px;letter-spacing:2px;transition:all .15s;border:1px solid}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.char-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:14px 8px;cursor:pointer;transition:all .15s}
.char-card:hover{background:rgba(255,216,102,.1);border-color:var(--gold);transform:translateY(-1px)}
.char-card.sel{background:rgba(255,216,102,.18);border-color:var(--gold)}
.char-card .ci{font-size:32px;margin-bottom:6px}
.char-card .cn{font-size:13px;letter-spacing:1px;margin-bottom:4px}
.char-card .cd{font-size:9px;color:var(--muted);line-height:1.4}

/* Toast */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(20,30,50,.95);border:1px solid var(--accent);border-radius:4px;padding:7px 18px;font-size:11px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:1px}
#toast.show{opacity:1}

/* 滚动条 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.tip{position:absolute;bottom:6px;right:8px;font-size:9px;color:var(--muted);background:rgba(0,0,0,.6);padding:3px 6px;border-radius:3px;z-index:5;pointer-events:none}
</style>
</head>
<body>
<div id="app">

<!-- 顶栏 -->
<div id="topbar">
  <div class="nation-name" id="nation-name">龙华帝国</div>
  <div class="year" id="year-label">公元 1年 春</div>
  <div class="stat-pill gold">💰 国库 <span class="val" id="tp-gold">500</span></div>
  <div class="stat-pill pop">👥 人口 <span class="val" id="tp-pop">1000</span></div>
  <div class="stat-pill mil">⚔️ 军力 <span class="val" id="tp-mil">30</span></div>
  <div class="stat-pill stab">🏛️ 稳定 <span class="val" id="tp-stab">70</span>%</div>
  <div class="stat-pill tech">⚗️ 科技 <span class="val" id="tp-tech">1</span></div>
  <div id="speed-ctrl">
    <button class="spbtn active" data-sp="1">1x</button>
    <button class="spbtn" data-sp="2">2x</button>
    <button class="spbtn" data-sp="4">4x</button>
    <button class="spbtn" data-sp="0">⏸</button>
  </div>
  <div class="role-badge" id="role-badge" style="border-color:var(--gold);color:var(--gold)">👑 皇帝</div>
</div>

<!-- 左侧：部门列表 -->
<div id="sidebar"></div>

<!-- 中间：主操作区 -->
<div id="main">
  <div id="dept-title">加载中...</div>
  <div id="dept-subtitle">请选择部门</div>
  <div id="action-grid"></div>
  <div id="province-section">
    <h3>省份治理</h3>
    <div id="province-actions"></div>
  </div>
  <div id="arena-wrap">
    <canvas id="cv" tabindex="0"></canvas>
    <div id="unit-toolbar"></div>
    <div class="tip">WASD移动 · 鼠标出兵 · 1/2/3兵种</div>
  </div>
</div>

<!-- 右侧：数据 + 奏折 -->
<div id="rightpanel">
  <h3>国家概况</h3>
  <div id="right-content"></div>
  <h3 style="margin-top:8px">省份</h3>
  <div id="province-list"></div>
  <h3 style="margin-top:8px">朝堂议事</h3>
  <div id="memo-header">
    <span>📜 AI 部门请决事</span>
    <span class="badge" id="memo-count">0 待批</span>
  </div>
  <div id="memo-list"></div>
</div>

<!-- 底部：事件日志 -->
<div id="eventlog">
  <div id="eventlog-header">
    <span>📋 帝国日志</span>
    <span id="log-count" style="color:var(--accent)">0 条记录</span>
  </div>
  <div id="eventlog-body"></div>
</div>

</div><!-- #app -->

<!-- 模态框 -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">确认操作</h2>
    <p id="modal-desc">操作描述</p>
    <div id="modal-content"></div>
    <div class="modal-btns">
      <button id="modal-confirm" style="background:rgba(74,138,255,.2);border-color:var(--accent);color:var(--accent)">确 认</button>
      <button id="modal-cancel" style="background:rgba(255,80,100,.1);border-color:var(--red);color:var(--red)">取 消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ================================================================
//  帝国对决 EMPIRE CLASH  v1.6
//  国家仪表盘（仿 nation_sim）+ 实时战场嵌入
// ================================================================

// ===== 工具 =====
const $=id=>document.getElementById(id);
const fmt=n=>Math.round(n).toLocaleString();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rng=(a,b)=>a+Math.random()*(b-a);
const rngi=(a,b)=>Math.floor(rng(a,b+1));
const randi=rngi;
const rand=rng;

// ===== 国家状态 =====
const SEASONS=['春','夏','秋','冬'];
let state={
  // 基础
  year:1, season:0, turn:0, speed:1, paused:false,
  // 核心资源
  treasure:500, pop:1000,
  // 指标 0-100
  morale:70, stability:70, corruption:20, loyalty:60, tech:1,
  // 军事
  armyCur:30, armyMax:50, armyMorale:80,
  enemyHP:500, enemyMaxHP:500,
  // 战场
  player:null, enemy:null, soldiers:[], particles:[], resources:[],
  // 系统
  identity:'emperor', charType:'sage', memos:[], memoIdSeq:1,
  selectedUnit:'sword', over:false, win:false,
  // 部门行动冷却
  cooldowns:{},
  // 省份
  provinces:[],
  // 日志
  logs:[],
  // 战斗
  arenaActive:true, atkBuff:0, defBuff:0, efficiency:0, corruption:20, loyalty:60, popGrowth:0.02,
};

function newGame(charType){
  state.year=1; state.season=0; state.turn=0; state.speed=1; state.paused=false;
  state.treasure=500; state.pop=1000;
  state.morale=70; state.stability=70; state.tech=1;
  state.armyCur=30; state.armyMax=50; state.armyMorale=80;
  state.enemyHP=500; state.enemyMaxHP=500;
  state.charType=charType||'sage';
  state.identity='emperor';
  state.memos=[];
  state.memoIdSeq=1;
  // 立即生成 2 条初始奏折
  const initialDepts=['economy','military'];
  for(const did of initialDepts){
    const tpls=MEMO_TEMPLATES[did]||[];
    const valid=tpls.filter(t=>t.cond(state));
    if(valid.length===0)continue;
    const t=valid[randi(0,valid.length-1)];
    state.memos.push({
      id:state.memoIdSeq++, dept:did, text:t.tpl(state,CHAR_TEMPLATES[state.charType]),
      act:t.act, time:30, max:30, resolved:false,
    });
  }
  state.selectedUnit='sword';
  state.over=false; state.win=false;
  state.atkBuff=0; state.defBuff=0; state.efficiency=0;
  state.corruption=20; state.loyalty=60; state.popGrowth=0.02;
  state.provinces=PROVINCES_DEF.map(p=>({
    id:p.id,nm:p.nm,x:p.x,y:p.y,wealth:p.baseWealth,pop:p.basePop,troops:5,
    morale:70, status:'stable',
  }));
  state.resources=[];
  for(let i=0;i<50;i++){
    state.resources.push({x:50+Math.random()*1450,y:50+Math.random()*850,v:10,alive:true});
  }
  state.player={x:800,y:500,r:20,hp:100};
  state.enemy={x:1300,y:500,r:30,hp:500};
  state.soldiers=[];
  state.particles=[];
  state.cooldowns={};
  state.logs=[];
  spawnEnemyInitial();
  // 初始化日志
  addLog('emperor','👑 帝国建立！请开始治理你的国家。','event');
  addLog('economy','经济部已就位。','');
  addLog('military','军事部已就位。','');
  addLog('politic','政治部已就位。','');
  addLog('civic','民政部已就位。','');
  addLog('tech','科技部已就位。','');
  addLog('spy','情报局已就位。','');
  addLog('judge','司法部已就位。','');
}

function spawnEnemyInitial(){
  for(let i=0;i<6;i++){
    state.soldiers.push({
      x:1200+Math.random()*200,y:400+Math.random()*200,
      type:'sword',side:1,hp:60,maxHp:60,atk:12,range:30,spd:1.8,r:14,color:'#ff4444',
      atkCD:0,target:null,
    });
  }
}

// ===== 部门定义（含 6 个招牌行动） =====

// ===== 渲染 =====
function renderAll(){
  renderTopbar();
  renderSidebar();
  renderMain();
  renderRightPanel();
  renderLog();
  renderMemos();
  renderUnitToolbar();
}

function renderTopbar(){
  $('tp-gold').textContent=fmt(state.treasure);
  $('tp-pop').textContent=fmt(state.pop);
  $('tp-mil').textContent=state.armyCur;
  $('tp-stab').textContent=Math.round(state.stability);
  $('tp-tech').textContent=state.tech;
  $('year-label').textContent='公元 '+state.year+'年 '+SEASONS[state.season];
  const d=DEPTS.find(x=>x.id===state.identity);
  const badge=$('role-badge');
  badge.textContent=d.icon+' '+d.nm;
  badge.style.borderColor=d.color;
  badge.style.color=d.color;
}

function renderSidebar(){
  const sb=$('sidebar');
  sb.innerHTML=DEPTS.map(d=>{
    const isPlayer=d.id===state.identity;
    const isExpanded=d.id===expandedDept;
    return '<div class="dept-card '+(isExpanded?'expanded':'')+' '+(isPlayer?'player-here':'')+'" id="dc-'+d.id+'">'+
      '<div class="dept-header" onclick="toggleDept(\''+d.id+'\')">'+
        '<span class="dept-icon">'+d.ico+'</span>'+
        '<span class="dept-name" style="color:'+d.color+'">'+d.nm+'</span>'+
        '<span class="dept-badge '+(isPlayer?'badge-player':'badge-ai')+'">'+(isPlayer?'玩家':'AI')+'</span>'+
      '</div>'+
      '<div class="dept-body">'+
        deptMiniStats(d.id)+
        (isPlayer

function renderProvinceActions(){

  ['recruit','tax','aid'].forEach(act=>{

    if(act==='aid'){btn.innerHTML='赈济 <span class="pcost">80金</span>'; if(state.treasure<80)btn.disabled=true;}

function provinceAction(act){
  if(act==='recruit'){
    if(state.treasure<100||state.armyCur>=state.armyMax)return;
    state.treasure-=100;
    state.armyCur=Math.min(state.armyMax,state.armyCur+5);
    state.provinces.forEach(p=>p.troops+=1);
    addLog('politic','征兵5人，消耗100金','');
  }else if(act==='tax'){
    state.treasure+=50;
    state.morale=clamp(state.morale-2,0,100);
    state.provinces.forEach(p=>{p.morale=(p.morale||70)-2;});
    addLog('economy','全省加税+50金，民心略降','');
  }else if(act==='aid'){
    if(state.treasure<80)return;
    state.treasure-=80;
    state.morale=clamp(state.morale+3,0,100);
    state.provinces.forEach(p=>{p.morale=(p.morale||70)+2;p.pop=Math.min(100,p.pop+1);});
    addLog('civic','全省赈济-80金，民心+3','good');
  }
  renderRightPanel();
}

// ===== 奏折 =====
function aiGenerateMemos(){
  if(state.memos.filter(m=>!m.resolved).length>=3)return;
  const ch=CHAR_TEMPLATES[state.charType];
  const candidates=[];
  for(const dept of DEPTS){
    if(dept.id===state.identity)continue;
    const tpls=MEMO_TEMPLATES[dept.id]||[];
    for(const t of tpls){if(t.cond(state))candidates.push({dept, tpl:t});}
  }
  if(candidates.length===0)return;
  const pick=candidates[randi(0,candidates.length-1)];
  if(Math.random()>0.35)return;
  const text=pick.tpl.tpl(state,ch);
  state.memos.push({
    id:state.memoIdSeq++,dept:pick.dept.id,text,
    act:pick.tpl.act,time:30,max:30,resolved:false,
  });
}
function resolveMemo(id,action){
  const m=state.memos.find(x=>x.id===id);
  if(!m||m.resolved)return;
  m.resolved=true;
  const factor=action==='no'?0:(action==='change'?0.5:1);
  // 效果
  if(m.dept==='economy'){
    if(m.act.includes('加税')||m.act.includes('商税')){state.treasure+=200*factor;state.morale-=5*factor;}
    else if(m.act.includes('减税')){state.treasure-=100*factor;state.morale+=8*factor;}
  }else if(m.dept==='military'){
    if(m.act.includes('征兵')){const n=Math.round(30*factor);state.armyCur=Math.min(state.armyMax,state.armyCur+n);state.treasure-=200*factor;}
    else if(m.act.includes('要塞')){state.treasure-=150*factor;}
    else if(m.act.includes('训练')){state.treasure-=100*factor;}
  }else if(m.dept==='politic'){
    if(m.act.includes('新法')){state.morale+=5*factor;}
    else if(m.act.includes('宣慰')){state.morale+=8*factor;state.treasure-=80*factor;}
  }else if(m.dept==='civic'){
    if(m.act.includes('赈济')){state.morale+=12*factor;state.treasure-=150*factor;}
    else if(m.act.includes('水利')){state.treasure-=200*factor;}
  }else if(m.dept==='tech'){
    if(m.act.includes('军事')){state.treasure-=200*factor;state.tech=Math.min(5,state.tech+0.5*factor);}
    else if(m.act.includes('农业')){state.treasure-=150*factor;}
  }else if(m.dept==='spy'){
    state.treasure-=100*factor;state.enemyHP-=30*factor;
  }else if(m.dept==='judge'){
    state.treasure-=50*factor;
  }else if(m.dept==='emperor'){
    if(m.act.includes('税率')){state.treasure+=100*factor;}
    else if(m.act.includes('征兵')){state.armyCur+=20*factor;state.treasure-=100*factor;}
    else if(m.act.includes('赏赐')){state.morale+=5*factor;state.treasure-=100*factor;}
  }
  addLog(m.dept,m.act+' · '+(action==='ok'?'已批准':(action==='no'?'已驳回':'已修改')),action==='ok'?'good':(action==='no'?'bad':''));
}
function tickMemos(dt){
  for(const m of state.memos){
    if(m.resolved)continue;
    m.time-=dt;
    if(m.time<=0){resolveMemo(m.id,'ok');}
  }
  state.memos=state.memos.filter(m=>m.time>-2);
}

// ===== 部门行动 =====
function doDeptAction(actionId){
  const dept=DEPTS.find(d=>d.id===state.identity);
  if(!dept)return;
  const a=dept.actions.find(x=>x.id===actionId);
  if(!a)return;
  if((state.cooldowns[a.id]||0)>0)return;
  // 检查费用
  if(a.cost.treasure<0&&state.treasure<-a.cost.treasure){toast('国库金币不足','var(--red)');return;}
  if(a.cost.morale<0&&state.morale<-a.cost.morale){toast('民心不足','var(--red)');return;}
  if(a.cost.armyCur<0&&state.armyCur<-a.cost.armyCur){toast('兵力不足','var(--red)');return;}
  // 执行 fn
  try{a.fn();}catch(e){console.error('action fail',e);return;}
  state.cooldowns[a.id]=a.cd;
  addLog(state.identity,a.nm+' 已执行','');
  renderMain();
  renderTopbar();
  renderRightPanel();
}

function tickCooldowns(dt){
  let changed=false;
  for(const k in state.cooldowns){
    if(state.cooldowns[k]>0){state.cooldowns[k]=Math.max(0,state.cooldowns[k]-dt);changed=true;}
  }
  return changed;
}

// ===== 战场 =====
let cv,ctx,mouse={x:0,y:0,worldX:0,worldY:0};
const keys={};

function setupCanvas(){
  cv=$('cv');
  if(!cv)return;
  ctx=cv.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  cv.addEventListener('mousemove',e=>{
    const r=cv.getBoundingClientRect();
    mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
    const wrap=$('arena-wrap');
    if(!wrap)return;
    const ww=wrap.clientWidth,wh=400;
    const sx=ww/1550,sy=wh/900;
    mouse.worldX=mouse.x/sx+state.player.x-cv.width/(2*sx);
    mouse.worldY=mouse.y/sy+state.player.y-cv.height/(2*sy);
  });
  cv.addEventListener('mousedown',e=>{
    if(state.over||!state.arenaActive)return;
    const r=cv.getBoundingClientRect();
    const ww=$('arena-wrap').clientWidth,wh=400;
    const sx=ww/1550,sy=wh/900;
    const wx=mouse.x/sx+state.player.x-cv.width/(2*sx);
    const wy=mouse.y/sy+state.player.y-cv.height/(2*sy);
    spawnSoldier(wx,wy,state.selectedUnit,0);
  });
  // 键盘
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(['w','a','s','d'].includes(k)){keys[k]=true;e.preventDefault();}
    const dep=DEPTS.find(d=>d.key===e.key);
    if(dep){e.preventDefault();if(dep.id===state.identity)leaveDept(dep.id);else takeDept(dep.id);}
    if(e.key>='1'&&e.key<='3'){state.selectedUnit=['sword','archer','knight'][parseInt(e.key)-1];renderUnitToolbar();}
  },{capture:true});
  window.addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(['w','a','s','d'].includes(k))keys[k]=false;});
}

function resize(){
  if(!cv)return;
  const wrap=$('arena-wrap');
  if(!wrap)return;
  cv.width=wrap.clientWidth;cv.height=400;
}

function spawnSoldier(x,y,type,side){
  const d=UNIT_DEFS[type];
  if(side===0&&state.treasure<d.cost)return;
  if(side===0)state.treasure-=d.cost;
  state.soldiers.push({
    x,y,type,side,hp:d.hp,maxHp:d.hp,atk:d.atk,range:d.range,spd:d.spd,
    r:d.r,color:side===0?d.color:'#ff4444',
    atkCD:0,target:null,
  });
}

function updateArena(dt){
  if(!state.player)return;
  // 玩家移动
  let dx=0,dy=0;
  if(keys['w'])dy-=1;if(keys['s'])dy+=1;if(keys['a'])dx-=1;if(keys['d'])dx+=1;
  if(dx||dy){const len=Math.hypot(dx,dy);state.player.x+=(dx/len)*3.5;state.player.y+=(dy/len)*3.5;}
  state.player.x=clamp(state.player.x,20,1550);state.player.y=clamp(state.player.y,20,880);
  // 收集资源
  for(const r of state.resources){
    if(!r.alive)continue;
    const d=Math.hypot(state.player.x-r.x,state.player.y-r.y);
    if(d<state.player.r+30){r.alive=false;state.treasure+=r.v;
      for(let i=0;i<5;i++)state.particles.push({x:r.x,y:r.y,vx:rand(-2,2),vy:rand(-2,2),life:0.5,color:'#22cc88',r:3});
    }
  }
  if(state.resources.filter(r=>r.alive).length<30){
    state.resources.push({x:50+Math.random()*1450,y:50+Math.random()*850,v:10,alive:true});
  }
  // 敌军 AI 出兵
  if(Math.random()<0.008)spawnSoldier(1300+rand(-50,50),500+rand(-150,150),'sword',1);
  // 兵种行为
  for(const s of state.soldiers){
    if(!s||s.hp<=0)continue;
    s.atkCD=Math.max(0,s.atkCD-dt);
    if(!s.target||s.target.hp<=0||Math.hypot(s.target.x-s.x,s.target.y-s.y)>600){s.target=null;
      let best=null,bd=99999;
      for(const t of state.soldiers){if(t===s||t.side===s.side||t.hp<=0)continue;
        const d=Math.hypot(t.x-s.x,t.y-s.y);if(d<bd){bd=d;best=t;}
      }
      if(!best){if(s.side===0){const d=Math.hypot(state.enemy.x-s.x,state.enemy.y-s.y);if(d<bd){bd=d;best=state.enemy;}}
        else{const d=Math.hypot(state.player.x-s.x,state.player.y-s.y);if(d<bd){bd=d;best=state.player;}}}
      s.target=best;
    }
    if(s.target){
      const d=Math.hypot(s.target.x-s.x,s.target.y-s.y);
      if(d>s.range){s.x+=(s.target.x-s.x)/d*s.spd;if(s.y!==s.target.y)s.y+=(s.target.y-s.y)/d*s.spd;}
      else if(s.atkCD<=0){s.target.hp-=s.atk;s.atkCD=1.0;
        state.particles.push({x:(s.x+s.target.x)/2,y:(s.y+s.target.y)/2,vx:0,vy:0,life:0.3,color:'#ffaa44',r:5});
      }
    }
  }
  state.soldiers=state.soldiers.filter(s=>s.hp>0);
  // 玩家攻击敌方核心
  if(keys['j']){
    const d=Math.hypot(state.enemy.x-state.player.x,state.enemy.y-state.player.y);
    if(d<60){state.enemyHP-=0.5;
      if(Math.random()<0.2)state.particles.push({x:state.enemy.x+rand(-20,20),y:state.enemy.y+rand(-20,20),vx:0,vy:0,life:0.3,color:'#ff6644',r:4});
    }
  }
  // 兵攻击敌方核心
  for(const s of state.soldiers){if(s.side===0&&s.target===state.enemy){
    const d=Math.hypot(state.enemy.x-s.x,state.enemy.y-s.y);
    if(d<=s.range&&s.atkCD<=0){state.enemyHP-=s.atk;s.atkCD=1.0;}
  }}
  // 胜负
  if(state.player.hp<=0){state.over=true;state.win=false;showEnd('败北','国家陷落');}
  if(state.enemyHP<=0){state.over=true;state.win=true;showEnd('胜利','推掉敌方核心');}
  // 粒子
  for(const p of state.particles){p.x+=p.vx;p.y+=p.vy;p.life-=dt;}
  state.particles=state.particles.filter(p=>p.life>0);
}

function drawArena(){
  if(!ctx||!cv)return;
  ctx.clearRect(0,0,cv.width,cv.height);
  const wrap=$('arena-wrap');
  if(!wrap){ctx.fillStyle='#0f1729';ctx.fillRect(0,0,cv.width,cv.height);return;}
  const ww=wrap.clientWidth,wh=400;
  const sx=ww/1550,sy=wh/900;
  ctx.fillStyle='#0f1729';ctx.fillRect(0,0,cv.width,cv.height);
  // 网格
  ctx.strokeStyle='rgba(74,138,255,0.08)';ctx.lineWidth=1;
  for(let x=0;x<ww;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,wh);ctx.stroke();}
  for(let y=0;y<wh;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ww,y);ctx.stroke();}
  ctx.save();
  ctx.scale(sx,sy);
  ctx.translate(-state.player.x+cv.width/(2*sx),-state.player.y+cv.height/(2*sy));
  // 资源
  for(const r of state.resources){if(!r.alive)continue;
    ctx.fillStyle='#22cc88';ctx.shadowColor='#22cc88';ctx.shadowBlur=8;
    ctx.fillRect(r.x-6,r.y-6,12,12);ctx.shadowBlur=0;
  }
  // 敌方核心
  ctx.fillStyle='#ef4444';ctx.shadowColor='#ef4444';ctx.shadowBlur=20;
  ctx.fillRect(state.enemy.x-30,state.enemy.y-30,60,60);ctx.shadowBlur=0;
  ctx.fillStyle='#0008';ctx.fillRect(state.enemy.x-32,state.enemy.y-45,64,6);
  ctx.fillStyle='#ef4444';ctx.fillRect(state.enemy.x-32,state.enemy.y-45,64*(state.enemyHP/state.enemyMaxHP),6);
  // 玩家
  ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(state.player.x,state.player.y,state.player.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#0008';ctx.fillRect(state.player.x-20,state.player.y-32,40,5);
  ctx.fillStyle='#4ade80';ctx.fillRect(state.player.x-20,state.player.y-32,40*(state.player.hp/100),5);
  // 兵
  for(const s of state.soldiers){
    ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0008';ctx.fillRect(s.x-12,s.y-s.r-6,24,3);
    ctx.fillStyle='#fff';ctx.fillRect(s.x-12,s.y-s.r-6,24*(s.hp/s.maxHp),3);
  }
  // 粒子
  for(const p of state.particles){
    ctx.globalAlpha=clamp(p.life*2,0,1);ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function renderUnitToolbar(){
  const bar=$('unit-toolbar');
  if(!bar)return;
  bar.innerHTML='';
  for(const k in UNIT_DEFS){
    const d=UNIT_DEFS[k];
    const b=document.createElement('button');
    b.className='u-btn'+(k===state.selectedUnit?' sel':'');
    b.innerHTML='<span class="uic">'+d.ico+'</span><span class="unm">'+d.nm+'</span><span class="uoc">'+d.cost+'金</span>';
    b.onclick=()=>{state.selectedUnit=k;renderUnitToolbar();};
    bar.appendChild(b);
  }
}

// ===== 时间推进 =====
let simTimer=null,simSpeed=1,tickCount=0;

function gameTick(){
  tickCount++;
  // 收入/消耗
  state.treasure=Math.max(0,state.treasure+20);
  state.morale=clamp(state.morale+(Math.random()-0.5)*2,0,100);
  if(state.turn%12===0){state.year++;state.season=(state.season+1)%4;if(state.season===0)state.year++;}
  // 奏折
  aiGenerateMemos();
  tickMemos(1);
  // 部门行动冷却
  tickCooldowns(1);
  // 每回合：AI 行动
  aiTick();
  // 检查胜利
  checkGameStatus();
  renderAll();
}

function aiTick(){
  for(const dept of DEPTS){
    if(dept.id===state.identity)continue;
    dept.actions.forEach(a=>{
      if(state.cooldowns[a.id]>0)state.cooldowns[a.id]--;
    });
    const available=dept.actions.filter(a=>{
      if(state.cooldowns[a.id]>0)return false;
      if(a.cost.treasure<0&&state.treasure<-a.cost.treasure)return false;
      return true;
    });
    if(available.length>0&&Math.random()<0.3){
      // AI 简单策略
      const ch=CHAR_TEMPLATES[state.charType];
      let chosen=available[randi(0,available.length-1)];
      // 危机优先
      if(dept.id==='economy'&&state.morale<40){const c=available.find(x=>x.nm.includes('减税'));if(c)chosen=c;}
      if(dept.id==='military'&&state.armyCur<state.armyMax*0.4){const c=available.find(x=>x.nm.includes('征兵'));if(c)chosen=c;}
      if(dept.id==='civic'&&state.morale<50){const c=available.find(x=>x.nm.includes('赈济'));if(c)chosen=c;}
      try{chosen.fn();state.cooldowns[chosen.id]=chosen.cd;}catch(e){}
    }
  }
  // 玩家部门冷却
  const pdept=DEPTS.find(d=>d.id===state.identity);
  if(pdept)pdept.actions.forEach(a=>{if(state.cooldowns[a.id]>0)state.cooldowns[a.id]--;});
}

function checkGameStatus(){
  if(state.stability<=0){addLog('emperor','⚠️ 稳定度归零，帝国陷入动乱！','bad');toast('⚠️ 帝国动乱！','var(--red)');}
  if(state.treasure<=0&&tickCount%10===0){addLog('economy','⚠️ 国库空虚，无法支付军队','bad');}
}

// ===== 主循环 =====
let lastT=0,memoCD=0;
function loop(now){
  if(!lastT)lastT=now;
  const dt=Math.min(0.1,(now-lastT)/1000)*simSpeed;
  lastT=now;
  if(!state.over){
    // 回合推进
    memoCD+=dt;
    if(memoCD>5){memoCD=0;state.turn++;}
    // 战场更新
    if(state.arenaActive)updateArena(dt);
    // 渲染
    if(state.arenaActive)drawArena();
    renderMemos();
    const cdChanged=tickCooldowns(dt);
    renderTopbar();
    if(cdChanged)renderMain();
  }
  requestAnimationFrame(loop);
}

// ===== 结算 =====
function showEnd(tt,desc){
  showModal(tt,desc,()=>{
    // 重新开始
    newGame(state.charType);
    renderAll();
    resize();
  });
  $('modal-confirm').textContent='再来一局';
  $('modal-cancel').textContent='返回菜单';
  $('modal-cancel').onclick=()=>{
    $('modal-overlay').classList.remove('on');
    // 回到角色选择
    showCharSelect();
  };
}

function showCharSelect(){
  $('modal-overlay').classList.add('on');
  $('modal-title').textContent='选择国家性格';
  $('modal-desc').textContent='影响 AI 部门决策倾向';
  $('modal-content').innerHTML=
    '<div class="char-grid">'+
      '<div class="char-card" data-char="sage"><div class="ci">👑</div><div class="cn">贤君之国</div><div class="cd">平衡发展 · 各部门均衡 · 稳健优先</div></div>'+
      '<div class="char-card" data-char="tyrant"><div class="ci">⚔️</div><div class="cn">暴君之国</div><div class="cd">军事优先 · 主动出击 · 风险高回报高</div></div>'+
      '<div class="char-card" data-char="corrupt"><div class="ci">💰</div><div class="cn">贪官之国</div><div class="cd">敛财优先 · 商业发达 · 民心易跌</div></div>'+
    '</div>';
  document.querySelectorAll('.char-card').forEach(c=>{
    c.onclick=()=>{
      document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel');
      selectedChar=c.dataset.char;
    };
  });
  selectedChar='sage';
  $('modal-confirm').textContent='开始治理';
  $('modal-confirm').onclick=()=>{
    $('modal-overlay').classList.remove('on');
    newGame(selectedChar);
    renderAll();
    setupCanvas();
    resize();
    requestAnimationFrame(loop);
  };
}
let selectedChar='sage';

// ===== 速度控制 =====
document.querySelectorAll('.spbtn').forEach(btn=>{
  btn.onclick=()=>{
    simSpeed=parseInt(btn.dataset.sp);
    document.querySelectorAll('.spbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
});

// ===== 启动 =====
setupCanvas();
resize();
showCharSelect();
</script>
