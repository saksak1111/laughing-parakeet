<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>帝国征途 EMPIRE CONQUEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f1a;--panel:#131828;--border:#1e2d4a;--accent:#4a8aff;
  --gold:#ffd866;--red:#ff4a6a;--green:#44dd88;--purple:#aa66ff;--orange:#ff9944;
  --text:#d8e4f0;--muted:#5a7a9a;--brown:#8b6914;--soil:#3d2817;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;overflow:hidden;height:100vh;font-size:13px;user-select:none}
#app{display:grid;grid-template-columns:220px 1fr 260px;grid-template-rows:50px 1fr 140px;height:100vh;gap:2px;background:#090b14}
button{cursor:pointer;font-family:inherit}

/* 顶栏 */
#topbar{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:14px;overflow:hidden}
#topbar .nation-name{color:var(--gold);font-size:15px;letter-spacing:3px;font-weight:bold;white-space:nowrap}
#topbar .year{color:var(--muted);font-size:11px;letter-spacing:2px;white-space:nowrap}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;font-size:11px;white-space:nowrap}
.stat-pill .val{font-weight:bold;color:#fff}
.stat-pill.gold .val{color:var(--gold)}
.stat-pill.pop .val{color:var(--green)}
.stat-pill.mil .val{color:var(--red)}
.stat-pill.stab .val{color:var(--purple)}
.stat-pill.tech .val{color:#44ccff}
#topbar .role-badge{padding:4px 12px;border-radius:3px;font-size:11px;letter-spacing:2px;border:1px solid;cursor:pointer;white-space:nowrap;margin-left:auto}
.role-badge:hover{opacity:.8}
#speed-ctrl{display:flex;align-items:center;gap:3px;margin-left:auto}
#speed-ctrl::before{content:'速度:';color:var(--muted);font-size:10px;margin-right:3px}
.spbtn{padding:3px 7px;font-size:10px;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:inherit;transition:all .1s}
.spbtn.active{background:rgba(74,138,255,.2);border-color:var(--accent);color:var(--accent)}
.spbtn:hover{background:rgba(255,255,255,.1)}

/* 左侧：部队与状态 */
#sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:8px}
#sidebar h3{color:var(--muted);font-size:10px;letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px}
.party-slot{display:flex;align-items:center;gap:6px;padding:5px 6px;margin-bottom:3px;border:1px solid var(--border);border-radius:3px;font-size:10px;background:rgba(0,0,0,.15)}
.party-slot .ps-ico{font-size:14px;width:20px;text-align:center}
.party-slot .ps-info{flex:1}
.party-slot .ps-nm{color:var(--text);font-size:10px}
.party-slot .ps-cnt{color:var(--gold);font-size:9px}
.party-slot .ps-hp{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:2px;overflow:hidden}
.party-slot .ps-hp-fill{height:100%;border-radius:2px;transition:width .3s}
.party-slot.wounded{border-color:rgba(255,74,106,.4)}
.party-slot.wounded .ps-hp-fill{background:var(--red)}
.party-slot.healthy .ps-hp-fill{background:var(--green)}

/* 中间：大地图 / 战场 */
#main{background:var(--panel);overflow:hidden;position:relative}
#map-cv{display:block;width:100%;height:100%;outline:none}
#battle-cv{display:none;width:100%;height:100%;outline:none}
#battle-ui{position:absolute;inset:0;display:none;pointer-events:none}
#battle-ui .battle-hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;pointer-events:auto}
#battle-ui .battle-hud .hud-btn{padding:5px 12px;background:rgba(0,0,0,.7);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:1px}
#battle-ui .battle-hud .hud-btn:hover{background:rgba(74,138,255,.2);border-color:var(--accent)}
#battle-ui .unit-bar{position:absolute;left:50%;transform:translateX(-50%);bottom:10px;display:flex;gap:5px;z-index:10;pointer-events:auto;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);padding:4px;border-radius:6px;border:0.5px solid rgba(255,255,255,.15)}

/* 战后结算面板 */
#battle-result-panel{display:none}
#battle-result-panel.on{display:flex!important}
.result-card{background:var(--panel);border:2px solid #d4af37;border-radius:6px;padding:16px;width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 0 30px rgba(212,175,55,.3)}
.result-card h2{color:var(--gold);font-size:16px;letter-spacing:3px;margin-bottom:8px;text-align:center}
.result-banner{text-align:center;padding:6px;font-size:13px;font-weight:bold;letter-spacing:2px;border-radius:3px;margin-bottom:10px}
.result-banner.victory{background:rgba(68,221,136,.2);color:#44dd88;border:1px solid rgba(68,221,136,.4)}
.result-banner.defeat{background:rgba(255,74,106,.2);color:#ff4a6a;border:1px solid rgba(255,74,106,.4)}
.result-banner.retreat{background:rgba(255,170,68,.2);color:#ffaa44;border:1px solid rgba(255,170,68,.4)}
.result-section{margin-bottom:10px;border:1px solid var(--border);border-radius:3px;padding:8px;background:rgba(0,0,0,.2)}
.result-section h4{color:var(--muted);font-size:10px;letter-spacing:1px;margin-bottom:6px}
.casualty-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px}
.casualty-col h5{color:var(--text);font-size:10px;margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:2px}
.troop-stat{display:flex;justify-content:space-between;margin-bottom:2px}
.troop-stat .dead{color:var(--red);font-weight:bold}
.troop-stat .alive{color:var(--green)}
.loot-grid{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}
.loot-item{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:3px;border:1px solid var(--border)}
.loot-item .loot-val{color:var(--gold);font-weight:bold}
.prisoner-btns{display:flex;gap:6px;margin-top:6px}
.prisoner-btn{flex:1;padding:5px;font-size:10px;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:inherit;letter-spacing:1px}
.prisoner-btn:hover{background:rgba(74,138,255,.15);border-color:var(--accent)}
.prisoner-btn.recruit{border-color:rgba(74,138,255,.4)}
.prisoner-btn.release{border-color:rgba(68,221,136,.4)}
.prisoner-btn.sell{border-color:rgba(255,170,68,.4)}

/* 城镇面板 */
#town-panel{position:absolute;inset:0;background:rgba(13,20,35,.95);z-index:20;display:none;flex-direction:column;padding:16px}
#town-panel.on{display:flex}
#town-panel h2{color:var(--gold);font-size:16px;letter-spacing:3px;margin-bottom:10px}
#town-panel .town-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;overflow-y:auto}
#town-panel .town-section{border:1px solid var(--border);border-radius:4px;padding:10px;background:rgba(0,0,0,.2)}
#town-panel .town-section h4{color:var(--muted);font-size:10px;letter-spacing:1px;margin-bottom:6px}
#town-panel .town-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px}
#town-panel .town-row span{color:var(--text)}
#town-panel .town-btn{width:100%;margin-top:6px;padding:5px;font-size:10px;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:inherit;letter-spacing:1px;transition:all .15s}
#town-panel .town-btn:hover:not(:disabled){background:rgba(74,138,255,.15);border-color:var(--accent)}
#town-panel .town-btn:disabled{opacity:.35;cursor:not-allowed}
#town-panel .town-btn .cost{color:var(--gold);font-size:9px}
#town-panel .close-btn{position:absolute;top:10px;right:10px;padding:4px 10px;background:rgba(255,80,100,.1);border:1px solid rgba(255,80,100,.3);border-radius:3px;color:var(--red);font-size:10px;cursor:pointer;font-family:inherit}
#town-panel .close-btn:hover{background:rgba(255,80,100,.2)}

/* 右侧：世界信息 */
#rightpanel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:8px}
#rightpanel h3{color:var(--muted);font-size:10px;letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px}
.r-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;color:var(--muted)}
.r-row span{color:var(--text)}
.r-row span.up{color:var(--green)}
.r-row span.dn{color:var(--red)}
.progress-wrap{margin-bottom:6px}
.progress-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;color:var(--muted)}
.progress-label span{color:var(--text)}
.progress-bar{height:5px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s}

/* 底部：日志 */
#eventlog{grid-column:1/-1;background:var(--panel);border-top:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
#eventlog-header{padding:5px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:2px}
#eventlog-body{flex:1;overflow-y:auto;padding:5px 14px;display:flex;flex-direction:column-reverse;gap:2px}
.log-entry{font-size:10px;line-height:1.4;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-entry .log-time{color:var(--muted);margin-right:6px}
.log-entry .log-msg{color:var(--text)}
.log-entry.bad .log-msg{color:var(--red)}
.log-entry.good .log-msg{color:var(--green)}
.log-entry.event .log-msg{color:var(--gold)}
.log-entry.battle .log-msg{color:var(--orange)}

/* 兵种按钮 */
.u-btn{width:42px;height:42px;background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--text);position:relative;cursor:pointer}
.u-btn:hover{background:rgba(255,216,102,.15)}
.u-btn.sel{background:var(--gold);color:#0c1220;border-color:var(--gold)}
.u-btn .uic{font-size:16px}
.u-btn .uoc{font-size:8px;color:var(--gold);margin-top:1px}
.u-btn.sel .uoc{color:#0c1220}

/* 模态 */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
#modal-overlay.on{display:flex}
#modal-box{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:24px;width:420px;text-align:center;max-height:90vh;overflow-y:auto}
#modal-box h2{color:var(--gold);font-size:16px;letter-spacing:3px;margin-bottom:10px}
#modal-box p{color:var(--muted);font-size:11px;line-height:1.7;margin-bottom:16px;text-align:left}
#modal-box .modal-btns{display:flex;gap:10px;justify-content:center}
#modal-box .modal-btns button{padding:6px 20px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:3px;letter-spacing:2px;transition:all .15s;border:1px solid}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.char-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:14px 8px;cursor:pointer;transition:all .15s}
.char-card:hover{background:rgba(255,216,102,.1);border-color:var(--gold);transform:translateY(-1px)}
.char-card.sel{background:rgba(255,216,102,.18);border-color:var(--gold)}
.char-card .ci{font-size:32px;margin-bottom:6px}
.char-card .cn{font-size:13px;letter-spacing:1px;margin-bottom:4px}
.char-card .cd{font-size:9px;color:var(--muted);line-height:1.4}

/* Toast */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(20,30,50,.95);border:1px solid var(--accent);border-radius:4px;padding:7px 18px;font-size:11px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:1px}
#toast.show{opacity:1}

/* 滚动条 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 地图标记提示 */
.map-tip{position:absolute;background:rgba(0,0,0,.8);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:10px;color:var(--text);z-index:15;pointer-events:none;white-space:nowrap}
.map-tip .mt-name{color:var(--gold);font-size:11px;margin-bottom:2px}
.map-tip .mt-info{color:var(--muted);font-size:9px}
</style>
</head>
<body>
<div id="app">

<!-- 顶栏 -->
<div id="topbar">
  <div class="nation-name" id="nation-name">帝国征途</div>
  <div class="year" id="year-label">第 1 天</div>
  <div class="stat-pill gold">💰 <span class="val" id="tp-gold">500</span></div>
  <div class="stat-pill pop">🍞 <span class="val" id="tp-food">50</span></div>
  <div class="stat-pill mil">⚔️ <span class="val" id="tp-troops">30</span></div>
  <div class="stat-pill stab">🏛️ <span class="val" id="tp-renown">0</span></div>
  <div class="stat-pill tech">👥 <span class="val" id="tp-party">1</span></div>
  <div id="speed-ctrl">
    <button class="spbtn active" data-sp="1">1x</button>
    <button class="spbtn" data-sp="2">2x</button>
    <button class="spbtn" data-sp="4">4x</button>
    <button class="spbtn" data-sp="0">⏸</button>
  </div>
  <div class="role-badge" id="role-badge" style="border-color:var(--gold);color:var(--gold)">🚩 游荡</div>
</div>

<!-- 左侧：部队编制 -->
<div id="sidebar">
  <h3>🛡️ 部队编制</h3>
  <div id="party-list"></div>
  <h3 style="margin-top:10px">📊 状态</h3>
  <div class="r-row">日薪 <span id="party-wage">0</span>金</div>
  <div class="r-row">粮耗 <span id="party-food">0</span>/天</div>
  <div class="r-row">移速 <span id="party-speed">4.0</span></div>
  <div class="r-row">战力 <span id="party-power">0</span></div>
  <h3 style="margin-top:10px">🎯 目标</h3>
  <div id="target-info" style="font-size:10px;color:var(--muted)">点击地图移动</div>
</div>

<!-- 中间：大地图 / 战场 -->
<div id="main">
  <canvas id="map-cv" tabindex="0"></canvas>
  <canvas id="battle-cv" tabindex="0"></canvas>
  <div id="battle-ui">
    <div class="battle-hud">
      <button class="hud-btn" onclick="retreatFromBattle()">🏃 撤退</button>
      <button class="hud-btn" onclick="toggleBattleSpeed()">⏩ 加速</button>
    </div>
    <div class="unit-bar" id="unit-bar"></div>
  </div>
  
  <!-- 战后结算面板 -->
  <div id="battle-result-panel" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:30;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
    <div class="result-card">
      <h2 id="br-title">⚔️ 战斗结束</h2>
      <div class="result-banner" id="br-banner">胜利</div>
      
      <div class="result-section">
        <h4>📊 伤亡统计</h4>
        <div class="casualty-grid" id="br-casualties"></div>
      </div>
      
      <div class="result-section" id="br-loot-section">
        <h4>💎 战利品</h4>
        <div class="loot-grid" id="br-loot"></div>
      </div>
      
      <div class="result-section" id="br-prisoner-section" style="display:none">
        <h4>🔒 俘虏</h4>
        <div id="br-prisoners"></div>
        <div class="prisoner-btns">
          <button class="prisoner-btn recruit" onclick="recruitPrisoners()">招募</button>
          <button class="prisoner-btn release" onclick="releasePrisoners()">释放</button>
          <button class="prisoner-btn sell" onclick="sellPrisoners()">贩卖</button>
        </div>
      </div>
      
      <div class="result-section">
        <h4>🏆 声望变化</h4>
        <div id="br-fame" style="font-size:13px"></div>
      </div>
      
      <button class="close-btn" onclick="closeBattleResult()" style="position:relative;top:auto;right:auto;margin-top:10px;width:100%">继续征途</button>
    </div>
  </div>
  
  <!-- 城镇面板 -->
  <div id="town-panel">
    <button class="close-btn" onclick="closeTown()">✕ 离开</button>
    <h2 id="town-name">城镇</h2>
    <div class="town-grid">
      <div class="town-section">
        <h4>🏛️ 城镇信息</h4>
        <div class="town-row">人口 <span id="town-pop">0</span></div>
        <div class="town-row">繁荣度 <span id="town-prosperity">0</span></div>
        <div class="town-row">驻军 <span id="town-garrison">0</span></div>
        <div class="town-row">归属 <span id="town-owner">独立</span></div>
      </div>
      <div class="town-section">
        <h4>⚔️ 募兵</h4>
        <div id="town-recruit"></div>
      </div>
      <div class="town-section">
        <h4>🛒 市场</h4>
        <div class="town-row">粮食 <span id="town-food-price">0</span>金/单位</div>
        <button class="town-btn" onclick="buyFood(10)">买粮 10单位 <span class="cost">(<span id="buy10-cost">0</span>金)</span></button>
        <button class="town-btn" onclick="buyFood(50)">买粮 50单位 <span class="cost">(<span id="buy50-cost">0</span>金)</span></button>
      </div>
      <div class="town-section">
        <h4>🏨 休息</h4>
        <div class="town-row">伤员恢复速度 <span>+20%</span></div>
        <button class="town-btn" onclick="restInTown()">休息一天 <span class="cost">(免费)</span></button>
      </div>
    </div>
  </div>
  
  <!-- 地图提示 -->
  <div class="map-tip" id="map-tip" style="display:none">
    <div class="mt-name" id="mt-name"></div>
    <div class="mt-info" id="mt-info"></div>
  </div>
</div>

<!-- 右侧：世界信息 -->
<div id="rightpanel">
  <h3>🌍 附近</h3>
  <div id="nearby-list"></div>
  <h3 style="margin-top:8px">📜 任务</h3>
  <div id="quest-list" style="font-size:10px;color:var(--muted)">暂无任务</div>
  <h3 style="margin-top:8px">🏆 战绩</h3>
  <div class="r-row">战胜 <span id="stat-wins">0</span></div>
  <div class="r-row">战败 <span id="stat-losses">0</span></div>
  <div class="r-row">攻城 <span id="stat-sieges">0</span></div>
  <div class="r-row">俘虏 <span id="stat-prisoners">0</span></div>
</div>

<!-- 底部：事件日志 -->
<div id="eventlog">
  <div id="eventlog-header">
    <span>📋 征途日志</span>
    <span id="log-count" style="color:var(--accent)">0 条记录</span>
  </div>
  <div id="eventlog-body"></div>
</div>

</div><!-- #app -->

<!-- 模态框 -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">确认操作</h2>
    <p id="modal-desc">操作描述</p>
    <div id="modal-content"></div>
    <div class="modal-btns">
      <button id="modal-confirm" style="background:rgba(74,138,255,.2);border-color:var(--accent);color:var(--accent)">确 认</button>
      <button id="modal-cancel" style="background:rgba(255,80,100,.1);border-color:var(--red);color:var(--red)">取 消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ================================================================
//  帝国征途 EMPIRE CONQUEST  v2.0
//  骑砍2风格：大地图 + 遭遇战 + 城镇 + 部队编制
// ================================================================

// ===== 工具 =====
const $=id=>document.getElementById(id);
const fmt=n=>Math.round(n).toLocaleString();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rng=(a,b)=>a+Math.random()*(b-a);
const rngi=(a,b)=>Math.floor(rng(a,b+1));
const randi=rngi;
const rand=rng;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

// ===== 游戏状态 =====
let state={
  // 时间
  day:1, time:0, paused:false, speed:1,
  // 玩家
  gold:500, food:50, renown:0,
  // 大地图位置
  player:{x:400,y:300,r:12},

const BATTLE_WORLD_W=1600, BATTLE_WORLD_H=1200;

// ===== 初始化 =====
function newGame(){
  state.day=1; state.time=0; state.paused=false; state.speed=1;
  state.gold=500; state.food=50; state.renown=0;
  state.player={x:400,y:300,r:12};
  state.target=null; state.moving=false;
  state.party=[
    {type:'peasant',count:15,hp:1.0,wounded:0},
    {type:'militia',count:10,hp:1.0,wounded:0},
    {type:'archer',count:5,hp:1.0,wounded:0},
  ];
  state.wins=0; state.losses=0; state.sieges=0; state.prisoners=0;
  state.inBattle=false; state.battleSpeed=1;
  state.inTown=null;
  state.logs=[];
  
  // 生成城镇
  state.towns=TOWN_DEFS.map(t=>({...t,foodPrice:5+Math.floor(Math.random()*10)}));
  
  // 生成世界部队
  state.parties=[];
  state.caravans=[];
  state.bandits=[];
  generateWorldParties();
  
  addLog('event','👑 帝国征途开始！带领你的部队征服这片大陆。');
  addLog('good','初始部队：15农民 + 10民兵 + 5弓兵');
  addLog('','点击大地图移动，靠近城镇可进入，遭遇敌人自动战斗。');
}

function generateWorldParties(){
  // 生成领主部队
  for(let i=0;i<6;i++){
    const kingdoms=['kingdom_a','kingdom_b','kingdom_c'];
    const k=kingdoms[randi(0,2)];
    const t=state.towns.filter(x=>x.owner===k)[0]||state.towns[0];
    state.parties.push({
      id:'lord_'+i,x:t.x+rand(-100,100),y:t.y+rand(-100,100),r:14,
      kingdom:k, nm:KINGDOMS[k].nm+'领主'+i,
      troops:randi(15,40),type:'lord',spd:2.0,
      targetTown:state.towns[randi(0,state.towns.length-1)],
    });
  }
  // 生成商队
  for(let i=0;i<4;i++){
    const t1=state.towns[randi(0,state.towns.length-1)];
    const t2=state.towns[randi(0,state.towns.length-1)];
    state.caravans.push({
      id:'caravan_'+i,x:t1.x,y:t1.y,r:10,
      nm:'商队'+i, goods:randi(20,50), gold:randi(100,300),
      from:t1, to:t2, spd:1.5, type:'caravan',
    });
  }
  // 生成劫匪
  for(let i=0;i<5;i++){
    state.bandits.push({
      id:'bandit_'+i,x:rand(50,750),y:rand(50,550),r:10,
      nm:'劫匪团'+i, troops:randi(8,20), spd:2.2, type:'bandit',
    });
  }
}

// ===== 大地图 Canvas =====
let mapCv,mapCtx,battleCv,battleCtx;
const MAP_W=800,MAP_H=600;

function setupCanvas(){
  mapCv=$('map-cv');
  mapCtx=mapCv.getContext('2d');
  battleCv=$('battle-cv');
  battleCtx=battleCv.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  
  // 大地图交互
  mapCv.addEventListener('click',e=>{
    if(state.inBattle||state.inTown)return;
    const r=mapCv.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    // 检查是否点击了城镇
    const clickedTown=state.towns.find(t=>Math.hypot(t.x-mx,t.y-my)<25);
    if(clickedTown){enterTown(clickedTown);return;}
    // 否则设为移动目标
    state.target={x:mx,y:my};
    state.moving=true;
    $('target-info').textContent='目标: ('+Math.round(mx)+','+Math.round(my)+')';
  });
  
  mapCv.addEventListener('mousemove',e=>{
    if(state.inBattle||state.inTown)return;
    const r=mapCv.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    const tip=$('map-tip');
    // 检查悬停
    const town=state.towns.find(t=>Math.hypot(t.x-mx,t.y-my)<25);
    const party=state.parties.find(p=>Math.hypot(p.x-mx,p.y-my)<20);
    const bandit=state.bandits.find(b=>Math.hypot(b.x-mx,b.y-my)<20);
    const caravan=state.caravans.find(c=>Math.hypot(c.x-mx,c.y-my)<18);
    
    let target=null,name='',info='';
    if(town){target=town;name=town.nm;info='人口'+town.pop+' | 繁荣'+town.prosperity;}
    else if(party){target=party;name=party.nm;info='部队'+party.troops+'人 | '+KINGDOMS[party.kingdom].nm;}
    else if(bandit){target=bandit;name=bandit.nm;info='劫匪'+bandit.troops+'人';}
    else if(caravan){target=caravan;name=caravan.nm;info='货物'+caravan.goods+' | 资金'+caravan.gold+'金';}
    
    if(target){
      tip.style.display='block';
      tip.style.left=(mx+15)+'px';
      tip.style.top=(my-10)+'px';
      $('mt-name').textContent=name;
      $('mt-info').textContent=info;
    }else{
      tip.style.display='none';
    }
  });
}

function resize(){
  const main=$('main');
  if(!main)return;
  const w=main.clientWidth,h=main.clientHeight;
  mapCv.width=w;mapCv.height=h;
  battleCv.width=w;battleCv.height=h;
}

// ===== 大地图渲染 =====
function drawMap(){
  if(!mapCtx)return;
  const w=mapCv.width,h=mapCv.height;
  mapCtx.clearRect(0,0,w,h);
  
  // 背景（地形）
  mapCtx.fillStyle='#1a2a1a';mapCtx.fillRect(0,0,w,h);
  // 草地纹理
  for(let i=0;i<30;i++){
    mapCtx.fillStyle='rgba(60,100,60,0.3)';
    mapCtx.fillRect(rand(0,w),rand(0,h),rand(20,80),rand(20,80));
  }
  // 道路（城镇间连线）
  mapCtx.strokeStyle='rgba(139,105,20,0.3)';mapCtx.lineWidth=2;
  for(let i=0;i<state.towns.length;i++){
    for(let j=i+1;j<state.towns.length;j++){
      const d=dist(state.towns[i],state.towns[j]);
      if(d<250){
        mapCtx.beginPath();
        mapCtx.moveTo(state.towns[i].x,state.towns[i].y);
        mapCtx.lineTo(state.towns[j].x,state.towns[j].y);
        mapCtx.stroke();
      }
    }
  }
  
  // 城镇
  for(const t of state.towns){
    const k=KINGDOMS[t.owner];
    mapCtx.fillStyle=k?k.color:'#aa8866';
    mapCtx.shadowColor=mapCtx.fillStyle;mapCtx.shadowBlur=8;
    mapCtx.beginPath();mapCtx.arc(t.x,t.y,18,0,Math.PI*2);mapCtx.fill();
    mapCtx.shadowBlur=0;
    // 城墙
    mapCtx.strokeStyle='rgba(255,255,255,0.3)';mapCtx.lineWidth=2;
    mapCtx.beginPath();mapCtx.arc(t.x,t.y,22,0,Math.PI*2);mapCtx.stroke();
    // 名字
    mapCtx.fillStyle='#fff';mapCtx.font='11px Courier New';mapCtx.textAlign='center';
    mapCtx.fillText(t.nm,t.x,t.y-28);
    mapCtx.textAlign='left';
  }
  
  // 商队
  for(const c of state.caravans){
    mapCtx.fillStyle='#ffd866';mapCtx.shadowColor='#ffd866';mapCtx.shadowBlur=6;
    mapCtx.fillRect(c.x-6,c.y-6,12,12);mapCtx.shadowBlur=0;
  }
  
  // 劫匪
  for(const b of state.bandits){
    mapCtx.fillStyle='#ff4444';mapCtx.shadowColor='#ff4444';mapCtx.shadowBlur=6;
    mapCtx.beginPath();mapCtx.moveTo(b.x,b.y-8);mapCtx.lineTo(b.x-7,b.y+6);mapCtx.lineTo(b.x+7,b.y+6);mapCtx.fill();mapCtx.shadowBlur=0;
  }
  
  // 领主部队
  for(const p of state.parties){
    const k=KINGDOMS[p.kingdom];
    mapCtx.fillStyle=k?k.color:'#888';
    mapCtx.beginPath();mapCtx.arc(p.x,p.y,10,0,Math.PI*2);mapCtx.fill();
    mapCtx.fillStyle='#fff';mapCtx.font='9px Courier New';mapCtx.textAlign='center';
    mapCtx.fillText(p.troops+'',p.x,p.y+3);
    mapCtx.textAlign='left';
  }
  
  // 玩家
  mapCtx.fillStyle='#ffd700';mapCtx.shadowColor='#ffd700';mapCtx.shadowBlur=15;
  mapCtx.beginPath();mapCtx.arc(state.player.x,state.player.y,state.player.r,0,Math.PI*2);mapCtx.fill();
  mapCtx.shadowBlur=0;
  // 玩家旗帜
  mapCtx.fillStyle='#ffd700';
  mapCtx.fillRect(state.player.x+8,state.player.y-12,2,18);
  mapCtx.fillRect(state.player.x+8,state.player.y-12,10,8);
  
  // 目标标记
  if(state.target){
    mapCtx.strokeStyle='rgba(255,216,102,0.6)';mapCtx.lineWidth=2;
    mapCtx.setLineDash([4,4]);
    mapCtx.beginPath();mapCtx.moveTo(state.player.x,state.player.y);mapCtx.lineTo(state.target.x,state.target.y);mapCtx.stroke();
    mapCtx.setLineDash([]);
    mapCtx.fillStyle='rgba(255,216,102,0.4)';
    mapCtx.beginPath();mapCtx.arc(state.target.x,state.target.y,6,0,Math.PI*2);mapCtx.fill();
  }
}

// ===== 大地图更新 =====
function updateMap(dt){
  if(state.inBattle||state.inTown)return;
  
  // 玩家移动
  if(state.moving&&state.target){
    const dx=state.target.x-state.player.x;
    const dy=state.target.y-state.player.y;
    const d=Math.hypot(dx,dy);
    const moveSpd=getPartySpeed();
    if(d<5){state.moving=false;state.target=null;$('target-info').textContent='到达目标';}
    else{state.player.x+=(dx/d)*moveSpd;state.player.y+=(dy/d)*moveSpd;}
  }
  
  // 世界部队移动
  for(const p of state.parties){
    if(!p.targetTown)continue;
    const dx=p.targetTown.x-p.x,dy=p.targetTown.y-p.y;
    const d=Math.hypot(dx,dy);
    if(d<30){p.targetTown=state.towns[randi(0,state.towns.length-1)];}
    else{p.x+=(dx/d)*p.spd;p.y+=(dy/d)*p.spd;}
  }
  
  // 商队移动
  for(const c of state.caravans){
    if(!c.to)continue;
    const dx=c.to.x-c.x,dy=c.to.y-c.y;
    const d=Math.hypot(dx,dy);
    if(d<30){c.to=state.towns[randi(0,state.towns.length-1)];}
    else{c.x+=(dx/d)*c.spd;c.y+=(dy/d)*c.spd;}
  }
  
  // 劫匪游荡
  for(const b of state.bandits){
    if(!b.wanderTarget||dist(b,b.wanderTarget)<20){
      b.wanderTarget={x:rand(50,750),y:rand(50,550)};
    }
    const dx=b.wanderTarget.x-b.x,dy=b.wanderTarget.y-b.y;
    const d=Math.hypot(dx,dy);
    b.x+=(dx/d)*b.spd;b.y+=(dy/d)*b.spd;
  }
  
  // 遭遇检测
  checkEncounters();
  
  // 每日消耗
  state.time+=dt;
  if(state.time>=1){
    state.time=0;
    state.day++;
    dailyTick();
  }
}

function getPartySpeed(){
  let total=0,cnt=0;
  for(const s of state.party){if(s.count>0){total+=TROOP_DEFS[s.type].spd*s.count;cnt+=s.count;}}
  return cnt>0?total/cnt*1.5:3;
}

function getPartySize(){
  return state.party.reduce((a,b)=>a+b.count,0);
}

function getPartyWage(){
  return state.party.reduce((a,b)=>a+b.count*TROOP_DEFS[b.type].wage,0);
}

function getPartyFoodCost(){
  return state.party.reduce((a,b)=>a+b.count*TROOP_DEFS[b.type].food,0);
}

function getPartyPower(){
  return state.party.reduce((a,b)=>{
    const d=TROOP_DEFS[b.type];
    return a+b.count*(d.atk+d.def+d.hp/10);
  },0);
}

function dailyTick(){
  // 工资
  const wage=getPartyWage();
  state.gold-=wage;
  // 粮食
  const foodCost=getPartyFoodCost();
  state.food-=foodCost;
  if(state.food<0){
    state.food=0;
    // 没粮减员
    for(const s of state.party){
      if(s.count>0&&Math.random()<0.3){s.count--;addLog('bad','缺粮！'+TROOP_DEFS[s.type].nm+'逃跑','bad');}
    }
    state.party=state.party.filter(s=>s.count>0);
  }
  // 伤员恢复
  for(const s of state.party){
    if(s.wounded>0&&Math.random()<0.3){s.wounded=Math.max(0,s.wounded-1);}
  }
  // 破产
  if(state.gold<0){
    state.gold=0;
    addLog('bad','⚠️ 国库破产！部队士气低落','bad');
  }
  renderSidebar();
  renderTopbar();
}

function checkEncounters(){
  // 检查与劫匪遭遇
  for(const b of state.bandits){
    const d=dist(state.player,b);
    if(d<25){
      startBattle(b,'bandit');
      return;
    }
  }
  // 检查与领主遭遇
  for(const p of state.parties){
    const d=dist(state.player,p);
    if(d<25){
      const relation=KINGDOMS[p.kingdom].relation;
      if(relation==='hostile'){startBattle(p,'lord');return;}
      else if(relation==='neutral'){
        // 可以对话或攻击
        if(Math.random()<0.3){startBattle(p,'lord');return;}
      }
    }
  }
}

// ===== 战斗系统 =====
function startBattle(enemyParty,type){
  state.inBattle=true;
  state.battleEnemyType=type;
  state.battleEnemyName=enemyParty.nm;
  
  // 初始化战场状态
  state.battlePlayer=[];
  state.battleEnemy=[];
  state.battleParticles=[];
  state.battleProjectiles=[];
  state.battleFloatTexts=[];
  state.formation='follow';
  battleCamera={x:0,y:0};
  state.commander=null;
  
  // 生成我方部队（基于 party 编制）
  let playerIdx=0;
  const playerTotal=state.party.reduce((a,s)=>a+s.count,0);
  for(const s of state.party){
    const d=TROOP_DEFS[s.type];
    for(let i=0;i<s.count;i++){
      const angle=(playerIdx/Math.max(1,playerTotal))*Math.PI*2;
      const radius=30+(playerIdx%3)*20;
      state.battlePlayer.push({
        x:200+Math.cos(angle)*radius, y:BATTLE_WORLD_H/2+Math.sin(angle)*radius, r:d.r,
        type:s.type, hp:d.hp, maxHp:d.hp, atk:d.atk, def:d.def, range:d.range, spd:d.spd,
        color:d.color, atkCD:0, target:null,
      });
      playerIdx++;
    }
  }
  
  // 生成敌方部队
  const enemyCount=enemyParty.troops||15;
  const enemySubType=type==='bandit'?'bandit':(type==='lord'?'leader':'raider');
  const enemyType=type==='bandit'?'peasant':'militia';
  const d=TROOP_DEFS[enemyType];
  const isLeader=enemySubType==='leader';
  for(let i=0;i<enemyCount;i++){
    const angle=(i/enemyCount)*Math.PI*2;
    const radius=40+(i%3)*25;
    state.battleEnemy.push({
      x:BATTLE_WORLD_W-200+Math.cos(angle)*radius, y:BATTLE_WORLD_H/2+Math.sin(angle)*radius, r:isLeader?d.r+3:d.r,
      type:enemyType, enemySubType:enemySubType,
      hp:isLeader?d.hp*1.5:d.hp, maxHp:isLeader?d.hp*1.5:d.hp,
      atk:isLeader?d.atk+5:d.atk, def:isLeader?d.def+3:d.def, range:d.range, spd:d.spd,
      color:isLeader?'#ff6600':(type==='bandit'?'#ff4444':'#ff8844'), atkCD:0, target:null,
    });
  }
  
  state.selectedUnit='peasant';
  state.battlePreSnapshot=JSON.parse(JSON.stringify(state.party)); // 战前快照
  
  // 切换显示
  mapCv.style.display='none';
  battleCv.style.display='block';
  $('battle-ui').style.display='block';
  
  addLog('battle','⚔️ 遭遇 '+enemyParty.nm+'！('+enemyCount+'人)','battle');
  renderUnitBar();
  renderSidebar();
}

function retreatFromBattle(){
  if(!state.inBattle)return;
  state.inBattle=false;
  mapCv.style.display='block';
  battleCv.style.display='none';
  $('battle-ui').style.display='none';
  addLog('battle','🏃 从战斗中撤退','bad');
  state.losses++;
  renderSidebar();
}

function toggleBattleSpeed(){
  state.battleSpeed=state.battleSpeed===1?2:1;
  toast('战斗速度: '+state.battleSpeed+'x','var(--accent)');
}

function updateBattle(dt){
  if(!state.inBattle)return;
  dt*=state.battleSpeed;
  
  // 初始化指挥官
  if(!state.commander){
    state.commander={x:200,y:BATTLE_WORLD_H/2,r:15,hp:150,maxHp:150,atk:25,def:15,spd:3,color:'#ffd700',atkCD:0,target:null,facing:0};
  }
  
  // 初始化弹道和飘字
  if(!state.battleProjectiles)state.battleProjectiles=[];
  if(!state.battleFloatTexts)state.battleFloatTexts=[];
  if(!state.formation)state.formation='follow';
  
  // === 玩家 WASD 移动 ===
  let cdx=0,cdy=0;
  if(keys['w'])cdy-=1;if(keys['s'])cdy+=1;if(keys['a'])cdx-=1;if(keys['d'])cdx+=1;
  if(cdx||cdy){
    const len=Math.hypot(cdx,cdy);
    state.commander.x+=(cdx/len)*state.commander.spd;
    state.commander.y+=(cdy/len)*state.commander.spd;
    state.commander.facing=Math.atan2(cdy,cdx);
  }
  state.commander.x=clamp(state.commander.x,20,BATTLE_WORLD_W-20);
  state.commander.y=clamp(state.commander.y,20,BATTLE_WORLD_H-20);
  state.commander.atkCD=Math.max(0,state.commander.atkCD-dt);
  
  // 指挥官近战攻击
  if(state.commander.atkCD<=0){
    let nearestEnemy=null,nearestDist=40;
    for(const e of state.battleEnemy){if(e.hp<=0)continue;const d=dist(state.commander,e);if(d<nearestDist){nearestDist=d;nearestEnemy=e;}}
    if(nearestEnemy){
      const dmg=Math.max(1,state.commander.atk-nearestEnemy.def*0.3);
      const isCrit=Math.random()<0.15;
      const finalDmg=isCrit?Math.round(dmg*2):Math.round(dmg);
      nearestEnemy.hp-=finalDmg;
      state.commander.atkCD=0.8;
      state.battleFloatTexts.push({x:nearestEnemy.x+rand(-5,5),y:nearestEnemy.y-15,text:isCrit?finalDmg+'!':finalDmg+'',color:isCrit?'#ff4a6a':'#ffffff',life:0.8,maxLife:0.8,vy:-30,crit:isCrit});
      state.battleParticles.push({x:nearestEnemy.x,y:nearestEnemy.y,vx:rand(-2,2),vy:rand(-2,2),life:0.3,color:'#ffaa44',r:3});
    }
  }
  
  // === 我方士兵 AI（阵型系统） ===
  for(const s of state.battlePlayer){
    if(s.hp<=0)continue;
    s.atkCD=Math.max(0,s.atkCD-dt);
    
    // 找最近敌人
    if(!s.target||s.target.hp<=0){
      let best=null,bd=99999;
      for(const e of state.battleEnemy){if(e.hp<=0)continue;const d=dist(s,e);if(d<bd){bd=d;best=e;}}
      s.target=best;
    }
    
    const formation=state.formation||'follow';
    
    if(formation==='hold'){
      // F3 坚守：原地不动，只攻击进入范围的敌人
      if(s.target){
        const d=dist(s,s.target);
        if(d<=s.range+10&&s.atkCD<=0){performAttack(s,s.target,false);}
      }
    }else if(formation==='charge'){
      // F2 冲锋：全速冲向最近敌人
      if(s.target){
        moveToward(s,s.target,s.spd*1.2);
        const d=dist(s,s.target);
        if(d<=s.range+10&&s.atkCD<=0){performAttack(s,s.target,false);}
      }else{
        if(dist(s,state.commander)>60){moveToward(s,state.commander,s.spd*0.5);}
      }
    }else{
      // F1 跟随（默认）
      if(s.target){
        const d=dist(s,s.target);
        if(d<=s.range+10){
          if(s.atkCD<=0)performAttack(s,s.target,false);
        }else if(d<150){
          moveToward(s,s.target,s.spd);
        }else{
          followCommander(s);
        }
      }else{
        followCommander(s);
      }
    }
    
    // 我方单位间碰撞分离
    for(const s2 of state.battlePlayer){
      if(s===s2||s2.hp<=0)continue;
      const d=dist(s,s2);
      const minD=s.r+s2.r;
      if(d<minD&&d>0){
        const push=(minD-d)*0.5;
        const dx=(s.x-s2.x)/d,dy=(s.y-s2.y)/d;
        s.x+=dx*push;s.y+=dy*push;
      }
    }
  }
  
  // === 敌军 AI（增强版） ===
  for(const s of state.battleEnemy){
    if(s.hp<=0)continue;
    s.atkCD=Math.max(0,s.atkCD-dt);
    
    // 状态机：IDLE -> CHASE -> ATTACK -> FLEE
    const hpRatio=s.hp/s.maxHp;
    const distToCmd=dist(s,state.commander);
    
    // 低血量逃跑
    if(hpRatio<0.25&&s.enemySubType!=='leader'){
      // 向远离指挥官方向逃跑
      const fleeAngle=Math.atan2(s.y-state.commander.y,s.x-state.commander.x);
      s.x+=Math.cos(fleeAngle)*s.spd*1.3;
      s.y+=Math.sin(fleeAngle)*s.spd*1.3;
      s.x=clamp(s.x,20,BATTLE_WORLD_W-20);
      s.y=clamp(s.y,20,BATTLE_WORLD_H-20);
      continue;
    }
    
    // 首领光环：附近小弟获得加成
    if(s.enemySubType==='leader'){
      for(const e of state.battleEnemy){
        if(e===s||e.hp<=0)continue;
        const d=dist(s,e);
        if(d<150){
          e.atkBuff=1.2;e.defBuff=1.1;
        }else{
          e.atkBuff=1;e.defBuff=1;
        }
      }
    }
    
    // 找目标
    if(!s.target||s.target.hp<=0){
      let best=null,bd=99999;
      // 优先攻击玩家
      const cd=dist(s,state.commander);
      if(cd<250){best=state.commander;bd=cd;}
      // 否则攻击最近我方士兵
      for(const e of state.battlePlayer){if(e.hp<=0)continue;const d=dist(s,e);if(d<bd){bd=d;best=e;}}
      s.target=best;
    }
    
    // 呼叫支援：进入战斗时附近敌人也加入
    if(s.target&&dist(s,s.target)<200){
      for(const e of state.battleEnemy){
        if(e===s||e.hp<=0||e.target)continue;
        if(dist(s,e)<120&&Math.random()<0.3){
          e.target=s.target;
        }
      }
    }
    
    if(s.target){
      const d=dist(s,s.target);
      if(d>s.range+10){
        // 群体靠拢：同类型敌人靠近
        for(const e of state.battleEnemy){
          if(e===s||e.hp<=0||e.enemySubType!==s.enemySubType)continue;
          const ed=dist(s,e);
          if(ed>80&&ed<200){
            s.x+=(e.x-s.x)*0.02;
            s.y+=(e.y-s.y)*0.02;
          }
        }
        moveToward(s,s.target,s.spd);
      }else{
        if(s.atkCD<=0){
          const atkMult=s.atkBuff||1;
          const defMult=s.defBuff||1;
          const dmg=Math.max(1,(s.atk*atkMult)-(s.target.def||0)*0.3/defMult);
          const isCrit=Math.random()<0.1;
          const finalDmg=isCrit?Math.round(dmg*2):Math.round(dmg);
          s.target.hp-=finalDmg;
          s.atkCD=1.0;
          state.battleFloatTexts.push({x:s.target.x+rand(-5,5),y:s.target.y-15,text:isCrit?finalDmg+'!':finalDmg+'',color:isCrit?'#ff4a6a':'#ffffff',life:0.8,maxLife:0.8,vy:-30,crit:isCrit});
          state.battleParticles.push({x:s.target.x,y:s.target.y,vx:rand(-2,2),vy:rand(-2,2),life:0.3,color:'#ff6666',r:3});
        }
      }
    }
    
    // 敌方单位间碰撞分离
    for(const s2 of state.battleEnemy){
      if(s===s2||s2.hp<=0)continue;
      const d=dist(s,s2);
      const minD=s.r+s2.r;
      if(d<minD&&d>0){
        const push=(minD-d)*0.5;
        const dx=(s.x-s2.x)/d,dy=(s.y-s2.y)/d;
        s.x+=dx*push;s.y+=dy*push;
      }
    }
  }
  
  // === 弹道更新 ===
  for(const p of state.battleProjectiles){
    const dx=p.tx-p.x,dy=p.ty-p.y;
    const d=Math.hypot(dx,dy);
    if(d<p.spd*dt*60+5){
      if(p.target&&p.target.hp>0){
        const dmg=Math.max(1,p.dmg-(p.target.def||0)*0.3);
        const isCrit=Math.random()<0.15;
        const finalDmg=isCrit?Math.round(dmg*2):Math.round(dmg);
        p.target.hp-=finalDmg;
        state.battleFloatTexts.push({x:p.target.x+rand(-5,5),y:p.target.y-15,text:isCrit?finalDmg+'!':finalDmg+'',color:isCrit?'#ff4a6a':'#ffffff',life:0.8,maxLife:0.8,vy:-30,crit:isCrit});
        state.battleParticles.push({x:p.target.x,y:p.target.y,vx:rand(-2,2),vy:rand(-2,2),life:0.3,color:p.fromEnemy?'#ff6666':'#ffdd88',r:3});
      }
      p.dead=true;
    }else{
      p.x+=(dx/d)*p.spd*dt*60;
      p.y+=(dy/d)*p.spd*dt*60;
    }
  }
  state.battleProjectiles=state.battleProjectiles.filter(p=>!p.dead);
  
  // === 伤害飘字更新 ===
  for(const ft of state.battleFloatTexts){ft.y+=(ft.vy||-30)*dt;ft.life-=dt;}
  state.battleFloatTexts=state.battleFloatTexts.filter(ft=>ft.life>0);
  
  // 清理死亡
  state.battlePlayer=state.battlePlayer.filter(s=>s.hp>0);
  state.battleEnemy=state.battleEnemy.filter(s=>s.hp>0);
  
  // 粒子
  for(const p of state.battleParticles){p.x+=p.vx;p.y+=p.vy;p.life-=dt;}
  state.battleParticles=state.battleParticles.filter(p=>p.life>0);
  
  // 胜负判定
  if(state.battleEnemy.length===0){endBattle(true);}
  else if(state.battlePlayer.length===0||state.commander.hp<=0){endBattle(false);}
}

// --- 战斗辅助函数 ---
function moveToward(unit,target,spd){
  const dx=target.x-unit.x,dy=target.y-unit.y;
  const d=Math.hypot(dx,dy);
  if(d>0.1){unit.x+=(dx/d)*spd;unit.y+=(dy/d)*spd;}
  unit.x=clamp(unit.x,10,BATTLE_WORLD_W-10);
  unit.y=clamp(unit.y,10,BATTLE_WORLD_H-10);
}

function followCommander(s){
  const idx=state.battlePlayer.indexOf(s);
  const angle=(idx/Math.max(1,state.battlePlayer.length))*Math.PI*2;
  const targetX=state.commander.x+Math.cos(angle)*50;
  const targetY=state.commander.y+Math.sin(angle)*50;
  const d=Math.hypot(targetX-s.x,targetY-s.y);
  if(d>5){moveToward(s,{x:targetX,y:targetY},s.spd*0.8);}
}

function performAttack(attacker,target,fromEnemy){
  attacker.atkCD=1.0;
  const def=TROOP_DEFS[attacker.type];
  // 弓兵发射弹道
  if(def&&(attacker.type==='archer'||attacker.type==='sharpshooter'||attacker.type==='horseman')){
    state.battleProjectiles.push({x:attacker.x,y:attacker.y,sx:attacker.x,sy:attacker.y,tx:target.x,ty:target.y,target:target,spd:8,dmg:attacker.atk,fromEnemy:fromEnemy});
  }else{
    // 近战直接伤害
    const dmg=Math.max(1,attacker.atk-(target.def||0)*0.3);
    const isCrit=Math.random()<0.15;
    const finalDmg=isCrit?Math.round(dmg*2):Math.round(dmg);
    target.hp-=finalDmg;
    state.battleFloatTexts.push({x:target.x+rand(-5,5),y:target.y-15,text:isCrit?finalDmg+'!':finalDmg+'',color:isCrit?'#ff4a6a':'#ffffff',life:0.8,maxLife:0.8,vy:-30,crit:isCrit});
    state.battleParticles.push({x:target.x,y:target.y,vx:rand(-2,2),vy:rand(-2,2),life:0.3,color:fromEnemy?'#ff6666':'#ffaa44',r:3});
  }
}

// --- 阵型命令 ---
function setFormation(cmd){
  state.formation=cmd;
  const labels={follow:'跟随',charge:'冲锋',hold:'坚守'};
  const colors={follow:'var(--accent)',charge:'var(--red)',hold:'var(--gold)'};
  toast('阵型: '+labels[cmd],colors[cmd]||'var(--accent)');
  addLog('battle','📋 阵型命令: '+labels[cmd],'');
}

function endBattle(win){
  state.inBattle=false;
  state.battleProjectiles=[];
  state.battleFloatTexts=[];
  state.formation='follow';
  
  // 计算战后结果
  const result=calculateBattleResult(win);
  
  // 应用结果
  applyBattleResult(result);
  
  // 显示战后面板
  showBattleResult(result);
}

// ===== 战后计算 =====
function calculateBattleResult(outcome){
  const result={
    outcome:outcome?'victory':(outcome===null?'retreat':'defeat'),
    playerCasualties:[],
    enemyCasualties:[],
    loot:{gold:0,food:0,gear:0},
    prisoners:[],
    fameChange:0,
    originalParty:JSON.parse(JSON.stringify(state.party))
  };
  
  // 统计我方伤亡（对比开战前的party）
  const aliveCounts={};
  for(const s of state.battlePlayer){
    if(s.hp>0)aliveCounts[s.type]=(aliveCounts[s.type]||0)+1;
  }
  
  for(const slot of result.originalParty){
    const survived=aliveCounts[slot.type]||0;
    const dead=slot.count-survived;
    if(dead>0||slot.count>0){
      result.playerCasualties.push({
        type:slot.type,
        name:TROOP_DEFS[slot.type].nm,
        ico:TROOP_DEFS[slot.type].ico,
        total:slot.count,
        survived:survived,
        dead:dead
      });
    }
  }
  
  // 统计敌方伤亡
  const enemyAliveCounts={};
  for(const e of state.battleEnemy){
    if(e.hp>0){
      const key=e.enemySubType||'raider';
      enemyAliveCounts[key]=(enemyAliveCounts[key]||0)+1;
    }
  }
  
  const totalEnemy=state.battleEnemy.length;
  const enemyDead=totalEnemy-(enemyAliveCounts.bandit||0)-(enemyAliveCounts.raider||0)-(enemyAliveCounts.leader||0);
  
  result.enemyCasualties=[
    {type:'bandit',name:'土匪',total:totalEnemy,dead:enemyDead,survived:totalEnemy-enemyDead}
  ];
  
  // 战利品
  if(outcome){
    result.loot.gold=enemyDead*randi(5,15);
    result.loot.food=enemyDead*randi(2,8);
    if(Math.random()<0.3)result.loot.gear=randi(1,3);
    
    // 俘虏
    const prisonerCount=Math.floor(enemyDead*0.2);
    for(let i=0;i<prisonerCount;i++){
      result.prisoners.push({type:'bandit',name:'土匪',cost:10});
    }
    
    result.fameChange=10+Math.floor(enemyDead/5);
  }else if(outcome===null){
    result.fameChange=-20; // 撤退
  }else{
    result.fameChange=-10; // 战败
  }
  
  return result;
}

// ===== 应用战后结果 =====
function applyBattleResult(result){
  // 扣除死亡士兵
  for(const slot of state.party){
    const casualty=result.playerCasualties.find(c=>c.type===slot.type);
    if(casualty){
      slot.count=casualty.survived;
    }
  }
  state.party=state.party.filter(s=>s.count>0);
  
  // 保底：如果全军覆没，给3个农民
  if(state.party.length===0){
    state.party=[{type:'peasant',count:3,hp:1.0,wounded:0}];
    addLog('bad','💀 全军覆没！仅剩3名幸存者','bad');
  }
  
  // 应用战利品
  if(result.loot){
    state.gold+=result.loot.gold;
    state.food+=result.loot.food;
  }
  
  // 应用声望
  state.renown+=result.fameChange;
  
  // 保存俘虏到待处理
  state.pendingPrisoners=result.prisoners||[];
  
  // 统计
  if(result.outcome==='victory')state.wins++;
  else if(result.outcome==='defeat')state.losses++;
}

// ===== 显示战后面板 =====
function showBattleResult(result){
  const panel=$('battle-result-panel');
  panel.style.display='flex';
  panel.classList.add('on');
  
  // 标题和横幅
  const titles={victory:'✅ 胜利',defeat:'❌ 战败',retreat:'🏃 撤退'};
  const bannerClasses={victory:'victory',defeat:'defeat',retreat:'retreat'};
  const bannerTexts={victory:'胜利',defeat:'战败',retreat:'撤退'};
  
  $('br-title').textContent='⚔️ 战斗结束';
  const banner=$('br-banner');
  banner.className='result-banner '+bannerClasses[result.outcome];
  banner.textContent=bannerTexts[result.outcome];
  
  // 伤亡统计
  const casDiv=$('br-casualties');
  let casHTML='<div class="casualty-col"><h5>我方</h5>';
  for(const c of result.playerCasualties){
    casHTML+=`<div class="troop-stat">${c.ico} ${c.name}: <span class="alive">${c.survived}</span> / ${c.total} <span class="dead">(-${c.dead})</span></div>`;
  }
  casHTML+='</div><div class="casualty-col"><h5>敌方</h5>';
  for(const c of result.enemyCasualties){
    casHTML+=`<div class="troop-stat">${c.name}: <span class="alive">${c.survived}</span> / ${c.total} <span class="dead">(-${c.dead})</span></div>`;
  }
  casHTML+='</div>';
  casDiv.innerHTML=casHTML;
  
  // 战利品
  const lootDiv=$('br-loot');
  let lootHTML='';
  if(result.loot.gold>0)lootHTML+=`<div class="loot-item">💰 <span class="loot-val">+${result.loot.gold}</span></div>`;
  if(result.loot.food>0)lootHTML+=`<div class="loot-item">🍞 <span class="loot-val">+${result.loot.food}</span></div>`;
  if(result.loot.gear>0)lootHTML+=`<div class="loot-item">🗡️ <span class="loot-val">+${result.loot.gear}</span></div>`;
  if(!lootHTML)lootHTML='<div style="color:var(--muted);font-size:10px">无战利品</div>';
  lootDiv.innerHTML=lootHTML;
  
  // 俘虏
  const prisonerSection=$('br-prisoner-section');
  if(result.prisoners&&result.prisoners.length>0){
    prisonerSection.style.display='block';
    $('br-prisoners').innerHTML=result.prisoners.map(p=>`<div>${p.name} ×1</div>`).join('');
  }else{
    prisonerSection.style.display='none';
  }
  
  // 声望
  const fameText=result.fameChange>=0?`+${result.fameChange} 声望`:`${result.fameChange} 声望`;
  const fameColor=result.fameChange>=0?'var(--green)':'var(--red)';
  $('br-fame').innerHTML=`<span style="color:${fameColor};font-weight:bold">${fameText}</span>`;
  
  renderSidebar();
  renderTopbar();
}

// ===== 关闭战后面板 =====
function closeBattleResult(){
  const panel=$('battle-result-panel');
  panel.style.display='none';
  panel.classList.remove('on');
  
  mapCv.style.display='block';
  battleCv.style.display='none';
  $('battle-ui').style.display='none';
  
  // 自动释放未处理的俘虏
  if(state.pendingPrisoners&&state.pendingPrisoners.length>0){
    const count=state.pendingPrisoners.length;
    state.renown+=count*2;
    addLog('good',`🕊️ 释放 ${count} 名俘虏，声望 +${count*2}`,'good');
    state.pendingPrisoners=[];
  }
}

// ===== 俘虏处理 =====
function recruitPrisoners(){
  if(!state.pendingPrisoners||state.pendingPrisoners.length===0)return;
  let recruited=0,totalCost=0;
  for(const p of state.pendingPrisoners){
    if(state.gold>=p.cost){
      state.gold-=p.cost;
      totalCost+=p.cost;
      // 土匪转为农民
      const slot=state.party.find(s=>s.type==='peasant');
      if(slot)slot.count++;
      else state.party.push({type:'peasant',count:1,hp:1.0,wounded:0});
      recruited++;
    }
  }
  if(recruited>0){
    addLog('good',`✅ 招募 ${recruited} 名俘虏（-${totalCost}金）`,'good');
    toast(`招募 ${recruited} 名俘虏`,'var(--green)');
  }
  state.pendingPrisoners=[];
  showBattleResult(calculateBattleResult(true)); // 刷新面板
  renderSidebar();
}

function releasePrisoners(){
  if(!state.pendingPrisoners||state.pendingPrisoners.length===0)return;
  const count=state.pendingPrisoners.length;
  state.renown+=count*2;
  addLog('good',`🕊️ 释放 ${count} 名俘虏，声望 +${count*2}`,'good');
  toast(`释放 ${count} 名俘虏，声望 +${count*2}`,'var(--green)');
  state.pendingPrisoners=[];
  showBattleResult(calculateBattleResult(true));
  renderSidebar();
}

function sellPrisoners(){
  if(!state.pendingPrisoners||state.pendingPrisoners.length===0)return;
  let totalGold=0;
  for(const p of state.pendingPrisoners){
    totalGold+=5;
  }
  const count=state.pendingPrisoners.length;
  state.gold+=totalGold;
  state.renown-=count;
  addLog('event',`💰 贩卖 ${count} 名俘虏，+${totalGold}金，声望 -${count}`,'event');
  toast(`贩卖 ${count} 名俘虏 +${totalGold}金`,'var(--gold)');
  state.pendingPrisoners=[];
  showBattleResult(calculateBattleResult(true));
  renderSidebar();
}

// ===== 撤退 =====
function retreatFromBattle(){
  if(!state.inBattle)return;
  addLog('battle','🏃 从战斗中撤退','bad');
  endBattle(null); // null 表示撤退
}

function drawBattle(){
  if(!battleCtx)return;
  const w=battleCv.width,h=battleCv.height;
  battleCtx.clearRect(0,0,w,h);
  
  // 镜头跟随指挥官
  if(state.commander){
    const targetCamX=state.commander.x-w/2;
    const targetCamY=state.commander.y-h/2;
    battleCamera.x+=(targetCamX-battleCamera.x)*0.1;
    battleCamera.y+=(targetCamY-battleCamera.y)*0.1;
    battleCamera.x=clamp(battleCamera.x,0,BATTLE_WORLD_W-w);
    battleCamera.y=clamp(battleCamera.y,0,BATTLE_WORLD_H-h);
  }
  const camX=battleCamera.x,camY=battleCamera.y;
  
  // 草地背景（纹理感）
  battleCtx.fillStyle='#2a3a1a';battleCtx.fillRect(0,0,w,h);
  for(let wx=Math.floor(camX/60)*60;wx<camX+w;wx+=60){
    for(let wy=Math.floor(camY/60)*60;wy<camY+h;wy+=60){
      const seed=(wx*73+wy*37)%100;
      const sx=wx-camX,sy=wy-camY;
      if(seed<30){battleCtx.fillStyle='rgba(50,80,40,0.4)';battleCtx.fillRect(sx+(seed%20),sy+(seed%15),25+(seed%20),20+(seed%15));}
      else if(seed<50){battleCtx.fillStyle='rgba(80,110,50,0.25)';battleCtx.fillRect(sx+(seed%30),sy+(seed%25),15+(seed%15),12+(seed%10));}
      if(seed>85){battleCtx.fillStyle='rgba(100,140,60,0.3)';battleCtx.fillRect(sx+(seed%40),sy+(seed%35),3,2);battleCtx.fillRect(sx+(seed%40)+4,sy+(seed%35)+1,3,2);}
    }
  }
  
  // 泥土路径
  battleCtx.strokeStyle='rgba(100,80,50,0.3)';battleCtx.lineWidth=18;
  battleCtx.beginPath();
  battleCtx.moveTo(0-camX,BATTLE_WORLD_H*0.5-camY);
  battleCtx.quadraticCurveTo(BATTLE_WORLD_W*0.3-camX,BATTLE_WORLD_H*0.4-camY,BATTLE_WORLD_W*0.5-camX,BATTLE_WORLD_H*0.5-camY);
  battleCtx.quadraticCurveTo(BATTLE_WORLD_W*0.7-camX,BATTLE_WORLD_H*0.6-camY,BATTLE_WORLD_W-camX,BATTLE_WORLD_H*0.5-camY);
  battleCtx.stroke();
  
  // 世界边界
  battleCtx.strokeStyle='rgba(139,105,20,0.4)';battleCtx.lineWidth=3;
  battleCtx.strokeRect(-camX,-camY,BATTLE_WORLD_W,BATTLE_WORLD_H);
  
  // 弹道（弓箭飞行轨迹）
  if(state.battleProjectiles){
    for(const p of state.battleProjectiles){
      const px=p.x-camX,py=p.y-camY;
      const angle=Math.atan2(p.ty-p.sy,p.tx-p.sx);
      battleCtx.strokeStyle=p.fromEnemy?'rgba(255,100,100,0.5)':'rgba(255,220,150,0.6)';
      battleCtx.lineWidth=1.5;
      battleCtx.beginPath();battleCtx.moveTo(px,py);battleCtx.lineTo(px-Math.cos(angle)*12,py-Math.sin(angle)*12);battleCtx.stroke();
      battleCtx.fillStyle=p.fromEnemy?'#ff6666':'#ffdd88';
      battleCtx.beginPath();
      battleCtx.moveTo(px+Math.cos(angle)*5,py+Math.sin(angle)*5);
      battleCtx.lineTo(px-Math.cos(angle-0.4)*4,py-Math.sin(angle-0.4)*4);
      battleCtx.lineTo(px-Math.cos(angle+0.4)*4,py-Math.sin(angle+0.4)*4);
      battleCtx.closePath();battleCtx.fill();
    }
  }
  
  // 我方士兵
  for(const s of state.battlePlayer){
    const sx=s.x-camX,sy=s.y-camY;
    if(sx<-30||sx>w+30||sy<-30||sy>h+30)continue;
    const def=TROOP_DEFS[s.type];
    battleCtx.fillStyle='rgba(0,0,0,0.3)';battleCtx.beginPath();battleCtx.ellipse(sx,sy+s.r*0.7,s.r*0.8,s.r*0.3,0,0,Math.PI*2);battleCtx.fill();
    battleCtx.fillStyle=s.color;battleCtx.shadowColor=s.color;battleCtx.shadowBlur=4;
    battleCtx.beginPath();battleCtx.arc(sx,sy,s.r,0,Math.PI*2);battleCtx.fill();battleCtx.shadowBlur=0;
    battleCtx.font=(s.r*1.3)+'px sans-serif';battleCtx.textAlign='center';battleCtx.textBaseline='middle';
    battleCtx.fillText(def?def.ico:'🗡️',sx,sy);
    drawHpBar(sx,s.y-s.r-6,s.r*2,3,s.hp/s.maxHp,'#44dd88');
  }
  
  // 敌人
  for(const s of state.battleEnemy){
    const sx=s.x-camX,sy=s.y-camY;
    if(sx<-30||sx>w+30||sy<-30||sy>h+30)continue;
    battleCtx.fillStyle='rgba(0,0,0,0.3)';battleCtx.beginPath();battleCtx.ellipse(sx,sy+s.r*0.7,s.r*0.8,s.r*0.3,0,0,Math.PI*2);battleCtx.fill();
    battleCtx.fillStyle=s.color;battleCtx.shadowColor=s.color;battleCtx.shadowBlur=4;
    battleCtx.beginPath();battleCtx.arc(sx,sy,s.r,0,Math.PI*2);battleCtx.fill();battleCtx.shadowBlur=0;
    const enemyIco=s.enemySubType==='bandit'?'🔴':s.enemySubType==='raider'?'🟠':'👹';
    battleCtx.font=(s.r*1.3)+'px sans-serif';battleCtx.textAlign='center';battleCtx.textBaseline='middle';
    battleCtx.fillText(enemyIco,sx,sy);
    drawHpBar(sx,sy-s.r-6,s.r*2,3,s.hp/s.maxHp,'#ff4444');
  }
  
  // 指挥官
  if(state.commander){
    const cx=state.commander.x-camX,cy=state.commander.y-camY;
    battleCtx.fillStyle='rgba(0,0,0,0.4)';battleCtx.beginPath();battleCtx.ellipse(cx,cy+state.commander.r*0.7,state.commander.r*0.9,state.commander.r*0.35,0,0,Math.PI*2);battleCtx.fill();
    battleCtx.fillStyle='#ffd700';battleCtx.shadowColor='#ffd700';battleCtx.shadowBlur=15;
    battleCtx.beginPath();battleCtx.arc(cx,cy,state.commander.r,0,Math.PI*2);battleCtx.fill();battleCtx.shadowBlur=0;
    // 方向指示箭头
    if(state.commander.facing!==undefined){
      const fa=state.commander.facing;
      battleCtx.fillStyle='#fff';battleCtx.beginPath();
      battleCtx.moveTo(cx+Math.cos(fa)*(state.commander.r+6),cy+Math.sin(fa)*(state.commander.r+6));
      battleCtx.lineTo(cx+Math.cos(fa+2.5)*5,cy+Math.sin(fa+2.5)*5);
      battleCtx.lineTo(cx+Math.cos(fa-2.5)*5,cy+Math.sin(fa-2.5)*5);
      battleCtx.closePath();battleCtx.fill();
    }
    battleCtx.font=(state.commander.r*1.4)+'px sans-serif';battleCtx.textAlign='center';battleCtx.textBaseline='middle';
    battleCtx.fillText('⚔️',cx,cy);
    drawHpBar(cx-18,cy-state.commander.r-8,36,4,state.commander.hp/state.commander.maxHp,'#44dd88');
  }
  
  // 伤害飘字
  if(state.battleFloatTexts){
    for(const ft of state.battleFloatTexts){
      const fx=ft.x-camX,fy=ft.y-camY;
      const alpha=clamp(ft.life/ft.maxLife,0,1);
      battleCtx.globalAlpha=alpha;
      battleCtx.font=(ft.crit?'bold 16px':'12px')+' Courier New';
      battleCtx.textAlign='center';battleCtx.textBaseline='middle';
      battleCtx.strokeStyle='rgba(0,0,0,0.7)';battleCtx.lineWidth=3;
      battleCtx.strokeText(ft.text,fx,fy);
      battleCtx.fillStyle=ft.color;battleCtx.fillText(ft.text,fx,fy);
    }
    battleCtx.globalAlpha=1;
  }
  
  // 粒子
  for(const p of state.battleParticles){
    const px=p.x-camX,py=p.y-camY;
    battleCtx.globalAlpha=clamp(p.life*2,0,1);battleCtx.fillStyle=p.color;
    battleCtx.beginPath();battleCtx.arc(px,py,p.r,0,Math.PI*2);battleCtx.fill();
  }
  battleCtx.globalAlpha=1;
  
  // 阵型命令显示（屏幕上方）
  const formationLabels={follow:'F1 跟随',charge:'F2 冲锋',hold:'F3 坚守'};
  const formationColors={follow:'#4a8aff',charge:'#ff4a6a',hold:'#ffd866'};
  const cmd=state.formation||'follow';
  battleCtx.font='bold 13px Courier New';battleCtx.textAlign='center';battleCtx.textBaseline='top';
  const cmdText='📋 当前命令: '+(formationLabels[cmd]||cmd);
  const cmdW=battleCtx.measureText(cmdText).width;
  battleCtx.fillStyle='rgba(0,0,0,0.6)';battleCtx.fillRect(w/2-cmdW/2-8,8,cmdW+16,22);
  battleCtx.strokeStyle=formationColors[cmd]||'#4a8aff';battleCtx.lineWidth=1;
  battleCtx.strokeRect(w/2-cmdW/2-8,8,cmdW+16,22);
  battleCtx.fillStyle=formationColors[cmd]||'#4a8aff';
  battleCtx.fillText(cmdText,w/2,12);
  
  // 小地图
  drawMiniMap(w,h,camX,camY);
  
  // 底部提示
  battleCtx.fillStyle='rgba(255,255,255,0.3)';battleCtx.font='10px Courier New';
  battleCtx.textAlign='left';battleCtx.textBaseline='bottom';
  battleCtx.fillText('WASD移动 · F1跟随 F2冲锋 F3坚守 · 1-6切换兵种',10,h-10);
}

// 血条辅助函数
function drawHpBar(x,y,w,h,ratio,fillColor){
  battleCtx.fillStyle='rgba(0,0,0,0.6)';battleCtx.fillRect(x-1,y-1,w+2,h+2);
  battleCtx.fillStyle='rgba(40,40,40,0.8)';battleCtx.fillRect(x,y,w,h);
  battleCtx.fillStyle=fillColor;battleCtx.fillRect(x,y,w*clamp(ratio,0,1),h);
}

// 小地图
function drawMiniMap(screenW,screenH,camX,camY){
  const mmW=140,mmH=105;
  const mmX=screenW-mmW-10,mmY=10;
  const scaleX=mmW/BATTLE_WORLD_W,scaleY=mmH/BATTLE_WORLD_H;
  battleCtx.fillStyle='rgba(0,0,0,0.7)';battleCtx.fillRect(mmX-2,mmY-2,mmW+4,mmH+4);
  battleCtx.fillStyle='rgba(30,40,25,0.9)';battleCtx.fillRect(mmX,mmY,mmW,mmH);
  battleCtx.strokeStyle='rgba(74,138,255,0.4)';battleCtx.lineWidth=1;battleCtx.strokeRect(mmX,mmY,mmW,mmH);
  // 视野框
  battleCtx.strokeStyle='rgba(255,255,255,0.3)';battleCtx.lineWidth=1;
  battleCtx.strokeRect(mmX+camX*scaleX,mmY+camY*scaleY,battleCv.width*scaleX,battleCv.height*scaleY);
  // 我方
  battleCtx.fillStyle='#44dd88';
  for(const s of state.battlePlayer){battleCtx.fillRect(mmX+s.x*scaleX-1,mmY+s.y*scaleY-1,2,2);}
  // 敌方
  battleCtx.fillStyle='#ff4444';
  for(const s of state.battleEnemy){battleCtx.fillRect(mmX+s.x*scaleX-1,mmY+s.y*scaleY-1,2,2);}
  // 指挥官
  if(state.commander){
    battleCtx.fillStyle='#ffd700';
    battleCtx.beginPath();battleCtx.arc(mmX+state.commander.x*scaleX,mmY+state.commander.y*scaleY,2.5,0,Math.PI*2);battleCtx.fill();
  }
  battleCtx.fillStyle='rgba(255,255,255,0.4)';battleCtx.font='8px Courier New';
  battleCtx.textAlign='left';battleCtx.textBaseline='top';battleCtx.fillText('MAP',mmX+3,mmY+3);
}

// ===== 城镇系统 =====
function enterTown(town){
  state.inTown=town;
  state.moving=false;state.target=null;
  $('town-panel').classList.add('on');
  $('town-name').textContent=town.nm;
  $('town-pop').textContent=town.pop;
  $('town-prosperity').textContent=town.prosperity;
  $('town-garrison').textContent=town.garrison;
  const owner=KINGDOMS[town.owner];
  $('town-owner').textContent=owner?owner.nm:'独立';
  $('town-owner').style.color=owner?owner.color:'#aa8866';
  $('town-food-price').textContent=town.foodPrice;
  $('buy10-cost').textContent=town.foodPrice*10;
  $('buy50-cost').textContent=town.foodPrice*50;
  
  // 募兵列表
  const recruitDiv=$('town-recruit');
  recruitDiv.innerHTML='';
  const availTypes=['peasant','militia','archer'];
  for(const type of availTypes){
    const d=TROOP_DEFS[type];
    const btn=document.createElement('button');
    btn.className='town-btn';
    btn.innerHTML=d.ico+' '+d.nm+' <span class="cost">('+d.cost+'金)</span>';
    btn.onclick=()=>recruitTroop(type,town);
    if(state.gold<d.cost)btn.disabled=true;
    recruitDiv.appendChild(btn);
  }
  
  addLog('event','🏛️ 进入 '+town.nm,'good');
}

function closeTown(){
  state.inTown=null;
  $('town-panel').classList.remove('on');
}

function recruitTroop(type,town){
  const d=TROOP_DEFS[type];
  if(state.gold<d.cost){toast('金币不足','var(--red)');return;}
  state.gold-=d.cost;
  const existing=state.party.find(s=>s.type===type);
  if(existing){existing.count++;}
  else{state.party.push({type,count:1,hp:1.0,wounded:0});}
  addLog('good','招募 '+d.nm+' (-'+d.cost+'金)','good');
  renderSidebar();
  renderTopbar();
  // 刷新按钮状态
  enterTown(town);
}

function buyFood(amount){
  if(!state.inTown)return;
  const cost=state.inTown.foodPrice*amount;
  if(state.gold<cost){toast('金币不足','var(--red)');return;}
  state.gold-=cost;
  state.food+=amount;
  addLog('good','购买粮食 '+amount+'单位 (-'+cost+'金)','good');
  renderSidebar();
  renderTopbar();
}

function restInTown(){
  if(!state.inTown)return;
  // 伤员恢复
  let healed=0;
  for(const s of state.party){
    if(s.wounded>0){
      const recover=Math.min(s.wounded,Math.ceil(s.count*0.2));
      s.wounded-=recover;healed+=recover;
    }
  }
  if(healed>0){addLog('good','休息一天，'+healed+'名伤员恢复','good');}
  else{addLog('','休息一天，无伤员');}
  state.day++;
  dailyTick();
}

// ===== 渲染 =====
function renderAll(){
  renderTopbar();
  renderSidebar();
  renderRightPanel();
  renderLog();
}

function renderTopbar(){
  $('tp-gold').textContent=fmt(state.gold);
  $('tp-food').textContent=fmt(state.food);
  $('tp-troops').textContent=getPartySize();
  $('tp-renown').textContent=state.renown;
  $('tp-party').textContent=state.party.length;
  $('year-label').textContent='第 '+state.day+' 天';
  const status=state.inBattle?'战斗中':state.inTown?'在城镇':'游荡';
  $('role-badge').textContent='🚩 '+status;
}

function renderSidebar(){
  const list=$('party-list');
  if(!list)return;
  list.innerHTML=state.party.map(s=>{
    const d=TROOP_DEFS[s.type];
    const wounded=s.wounded>0;
    const hpPct=((s.count-s.wounded)/s.count)*100;
    return '<div class="party-slot '+(wounded?'wounded':'healthy')+'">'+
      '<span class="ps-ico">'+d.ico+'</span>'+
      '<div class="ps-info">'+
        '<div class="ps-nm">'+d.nm+' <span style="color:var(--gold)">'+s.count+'</span>'+(wounded?' <span style="color:var(--red)">('+s.wounded+'伤)</span>':'')+'</div>'+
        '<div class="ps-hp"><div class="ps-hp-fill" style="width:'+hpPct+'%"></div></div>'+
      '</div>'+
    '</div>';
  }).join('');
  
  $('party-wage').textContent=getPartyWage();
  $('party-food').textContent=getPartyFoodCost();
  $('party-speed').textContent=getPartySpeed().toFixed(1);
  $('party-power').textContent=Math.round(getPartyPower());
}

function renderRightPanel(){
  // 附近
  const nearby=$('nearby-list');
  if(!nearby)return;
  let html='';
  
  // 附近城镇
  const nearTowns=state.towns.filter(t=>dist(t,state.player)<200).slice(0,3);
  for(const t of nearTowns){
    const d=Math.round(dist(t,state.player));
    const owner=KINGDOMS[t.owner];
    html+='<div class="r-row">'+t.nm+' <span style="color:'+(owner?owner.color:'#aa8866')+'">'+d+'m</span></div>';
  }
  
  // 附近敌人
  const nearEnemies=state.bandits.filter(b=>dist(b,state.player)<150);
  for(const b of nearEnemies){
    const d=Math.round(dist(b,state.player));
    html+='<div class="r-row">'+b.nm+' <span style="color:var(--red)">'+d+'m ⚠️</span></div>';
  }
  
  nearby.innerHTML=html||'<div style="color:var(--muted);font-size:10px">附近无目标</div>';
  
  // 统计
  $('stat-wins').textContent=state.wins;
  $('stat-losses').textContent=state.losses;
  $('stat-sieges').textContent=state.sieges;
  $('stat-prisoners').textContent=state.prisoners;
}

function renderLog(){
  const body=$('eventlog-body');
  if(!body)return;
  body.innerHTML=state.logs.slice(0,40).map(l=>
    '<div class="log-entry '+(l.type||'')+'">'+
      '<span class="log-time">第'+l.day+'天</span>'+
      '<span class="log-msg"> '+l.msg+'</span>'+
    '</div>'
  ).join('');
  $('log-count').textContent=state.logs.length+' 条记录';
}

function addLog(msg,type){
  state.logs.unshift({day:state.day,msg,type:type||''});
  if(state.logs.length>120)state.logs.pop();
  renderLog();
}

function toast(msg,color){
  const t=$('toast');
  if(!t)return;
  t.textContent=msg;t.style.borderColor=color||'var(--accent)';t.style.color=color||'var(--accent)';
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ===== 兵种选择条 =====
function renderUnitBar(){
  const bar=$('unit-bar');
  if(!bar)return;
  bar.innerHTML='';
  for(const k in TROOP_DEFS){
    const d=TROOP_DEFS[k];
    const b=document.createElement('button');
    b.className='u-btn'+(k===state.selectedUnit?' sel':'');
    b.innerHTML='<span class="uic">'+d.ico+'</span><span class="uoc">'+d.cost+'金</span>';
    b.onclick=()=>{state.selectedUnit=k;renderUnitBar();};
    bar.appendChild(b);
  }
}

// ===== 键盘 =====
const keys={};
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['w','a','s','d'].includes(k)){keys[k]=true;e.preventDefault();}
  if(e.key>='1'&&e.key<='6'){
    const types=Object.keys(TROOP_DEFS);
    const idx=parseInt(e.key)-1;
    if(idx<types.length){state.selectedUnit=types[idx];renderUnitBar();}
  }
  // 阵型命令
  if(e.key==='F1'){setFormation('follow');e.preventDefault();}
  if(e.key==='F2'){setFormation('charge');e.preventDefault();}
  if(e.key==='F3'){setFormation('hold');e.preventDefault();}
});
window.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(['w','a','s','d'].includes(k))keys[k]=false;
});

// ===== 速度控制 =====
document.querySelectorAll('.spbtn').forEach(btn=>{
  btn.onclick=()=>{
    state.speed=parseInt(btn.dataset.sp);
    document.querySelectorAll('.spbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
});

// ===== 主循环 =====
let lastT=0;
function loop(now){
  if(!lastT)lastT=now;
  const dt=Math.min(0.1,(now-lastT)/1000)*state.speed;
  lastT=now;
  
  if(!state.paused){
    if(state.inBattle){
      updateBattle(dt);
      drawBattle();
    }else if(!state.inTown){
      updateMap(dt);
      drawMap();
    }
  }
  
  requestAnimationFrame(loop);
}

// ===== 启动 =====
setupCanvas();
newGame();
renderAll();
requestAnimationFrame(loop);
</script>
